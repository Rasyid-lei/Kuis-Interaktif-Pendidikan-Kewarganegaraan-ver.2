{id:74,q:"Aspek-aspek yang harus diperhatikan dalam menganalisis hubungan antar suku bangsa dan golongan: 1) sumber konflik dan potensi untuk toleransi, 2) sikap pandangan suku bangsa terhadap sesama suku bangsa, 3) kondisi masyarakat dimana pergaulan suku bangsa berlangsung. Dari pernyataan tersebut yang benar adalah....",opts:["Pernyataan 1 saja","Pernyataan 1 dan 2 saja","Pernyataan 2 dan 3 saja","Ketiganya benar (1, 2, dan 3)"],ans:3, exp:"Dalam menganalisis hubungan antar suku bangsa dan golongan, semua tiga aspek harus diperhatikan: (1) sumber konflik dan potensi toleransi, (2) sikap pandang suku bangsa terhadap sesama, dan (3) kondisi masyarakat tempat pergaulan. <b>Ketiganya benar</b> karena saling berkaitan dan tidak bisa dipisahkan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pernyataan 1 saja</b> — analisis tidak lengkap tanpa mempertimbangkan sikap subjektif dan kondisi kontekstual.<br>• <b>Pernyataan 1 dan 2 saja</b> — mengabaikan kondisi masyarakat (aspek 3) yang menentukan bagaimana relasi itu terwujud.<br>• <b>Pernyataan 2 dan 3 saja</b> — mengabaikan aspek konflik dan toleransi (aspek 1) yang merupakan inti analisis."},
{id:75,q:"Pandangan Torres tentang proses demokrasi dimana manusia sebagai makhluk yang mampu mengembangkan kekuasaan dan kemampuannya, disebut....",opts:["Protective democracy","Development democracy","Equilibrium democracy","Participatory democracy"],ans:1, exp:"Pandangan Torres bahwa <b>demokrasi adalah proses di mana manusia mampu mengembangkan kekuasaan dan kemampuannya</b> disebut <b>Development democracy</b>—demokrasi sebagai proses pengembangan potensi manusia.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Protective democracy</b> — bertujuan melindungi individu dari tirani penguasa (konsep Locke dan Madison), bukan tentang pengembangan potensi.<br>• <b>Equilibrium democracy</b> — menjaga keseimbangan kepentingan berbagai kelompok; fokus pada stabilitas, bukan pengembangan kapasitas manusia.<br>• <b>Participatory democracy</b> — menekankan partisipasi aktif warga dalam pengambilan keputusan; berbeda dari development democracy yang berfokus pengembangan kapasitas manusia."},
{id:76,q:"Salah satu fungsi Komnas HAM dalam pengkajian dan penelitian adalah....",opts:["Studi kepustakaan, studi lapangan, dan studi banding ke negara lain mengenai HAM","Penyebarluasan wawasan mengenai HAM kepada masyarakat","Melakukan perdamaian kedua belah pihak yang bertikai","Meningkatkan upaya pencegahan dan penanggulangan segala bentuk kekerasan terhadap perempuan"],ans:0, exp:"Dalam fungsi pengkajian dan penelitian, Komnas HAM berwenang melakukan <b>studi kepustakaan, studi lapangan, dan studi banding ke negara lain</b> mengenai HAM—menjadi dasar rekomendasi perbaikan kebijakan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Penyebarluasan wawasan mengenai HAM kepada masyarakat</b> — ini fungsi <i>penyuluhan</i> Komnas HAM, bukan pengkajian.<br>• <b>Melakukan perdamaian kedua belah pihak yang bertikai</b> — ini fungsi <i>mediasi</i> Komnas HAM.<br>• <b>Meningkatkan upaya pencegahan dan penanggulangan pelanggaran HAM</b> — ini tujuan umum Komnas HAM, bukan spesifik fungsi pengkajian."},
{id:77,q:"Persatuan Indonesia atau nasionalisme Indonesia telah berhasil mengikat bangsa Indonesia untuk merebut, mempertahankan, dan mengisi kemerdekaan. Rintisan awal terbentuknya rasa persatuan Indonesia diwujudkan dalam....",opts:["Keputusan Kongres Pemuda Indonesia","Proklamasi Kemerdekaan Indonesia","Sila Persatuan Indonesia","Pembukaan UUD 1945 alinea ketiga"],ans:0, exp:"Rintisan awal terbentuknya rasa persatuan Indonesia diwujudkan dalam <b>Keputusan Kongres Pemuda Indonesia</b> (Sumpah Pemuda, 28 Oktober 1928)—pemuda dari berbagai daerah bersatu menyatakan satu bangsa, satu tanah air, satu bahasa.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Proklamasi Kemerdekaan Indonesia</b> — terjadi pada 1945, jauh setelah Sumpah Pemuda; Proklamasi adalah <i>puncak</i>, bukan rintisan awal.<br>• <b>Sila Persatuan Indonesia</b> — Pancasila baru dirumuskan pada 1945; rintisan persatuan sudah ada sejak Sumpah Pemuda 1928.<br>• <b>Pembukaan UUD 1945 alinea ketiga</b> — pun produk 1945, bukan rintisan awal."},
{id:78,q:"Berikut ini adalah unsur-unsur yang merupakan faktor-faktor penting bagi pembentukan bangsa Indonesia, antara lain berikut ini, kecuali....",opts:["Persamaan asal keturunan bangsa (etnik) dari rumpun bangsa Melayu","Persamaan pola kebudayaan sebagai suku bangsa petani dan pelaut","Persamaan keyakinan dalam beribadah yang merupakan keyakinan mayoritas bangsa Indonesia","Persamaan nasib baik kejayaan bersama maupun penderitaan bersama di bawah dominasi penjajah"],ans:2, exp:"Faktor pembentuk bangsa Indonesia: persamaan etnik, pola kebudayaan, dan nasib sejarah. Yang <b>bukan</b> faktor pembentuk: <b>\"persamaan keyakinan dalam beribadah\"</b>—Indonesia memiliki beragam agama; justru keberagaman agama dijadikan kekuatan melalui Bhinneka Tunggal Ika.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Persamaan asal keturunan bangsa (etnik) dari rumpun Melayu</b> — mayoritas penduduk Indonesia dari rumpun yang sama; faktor pembentuk nyata.<br>• <b>Persamaan pola kebudayaan sebagai suku bangsa petani</b> — kesamaan dasar budaya agraris menjadi perekat identitas bangsa.<br>• <b>Persamaan nasib baik kejayaan bersama maupun penderitaan</b> — pengalaman dijajah dan berjuang bersama adalah faktor paling kuat yang mempersatukan bangsa."},
{id:79,q:"Contoh dari hak atas kebebasan pribadi, adalah....",opts:["Memilih status kewarganegaraan","Persamaan di depan hukum","Perlindungan terhadap penyiksaan","Perlindungan dari eksploitasi pekerjaan"],ans:0, exp:"<b>Memilih status kewarganegaraan</b> adalah contoh hak atas kebebasan pribadi karena berkaitan dengan identitas hukum seseorang yang paling fundamental—hak menentukan di mana seseorang secara legal menjadi anggota suatu bangsa.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Persamaan di depan hukum</b> — ini hak <i>sipil</i> (kesetaraan dalam sistem hukum), bukan hak kebebasan pribadi.<br>• <b>Perlindungan terhadap penyiksaan</b> — ini hak atas keselamatan dan integritas fisik, bukan kebebasan pribadi.<br>• <b>Perlindungan dari eksploitasi pekerjaan</b> — ini hak <i>ekonomi dan sosial</i> (hak tenaga kerja)."},
{id:80,q:"Barang siapa dengan maksud untuk menguntungkan diri sendiri atau orang lain secara melawan hukum, memaksa seseorang dengan kekerasan atau ancaman kekerasan... pernyataan tersebut terdapat dalam KUHP pasal....",opts:["368","355","378","365"],ans:0, exp:"Pasal yang mengatur pemerasan—memaksa seseorang dengan kekerasan atau ancaman kekerasan untuk menyerahkan sesuatu—adalah <b>Pasal 368 KUHP</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pasal 355</b> — mengatur penganiayaan berat yang direncanakan (aggravated premeditated assault), bukan pemerasan.<br>• <b>Pasal 378</b> — mengatur <i>penipuan</i> (bedrog) dengan tipu muslihat, bukan dengan kekerasan.<br>• <b>Pasal 365</b> — mengatur pencurian dengan kekerasan (mencuri sambil menggunakan kekerasan), berbeda dari pemerasan di mana korban dipaksa <i>menyerahkan</i> barang secara langsung."},
{id:81,q:"Prof. Dr. Sudargo Gautama, SH. mengemukakan 3 ciri-ciri atau unsur-unsur dari negara hukum, yakni berikut ini, kecuali....",opts:["Terdapat pembatasan kekuatan negara terhadap perorangan","Asas legalitas","Pemisahan kekuasaan","Kekuatan ditangan eksekutif"],ans:3, exp:"Prof. Dr. Sudargo Gautama mengemukakan 3 ciri negara hukum: (1) pembatasan kekuatan negara terhadap perorangan, (2) asas legalitas, dan (3) pemisahan kekuasaan. Yang <b>bukan</b> ciri negara hukum: <b>\"kekuatan di tangan eksekutif\"</b>—bertentangan dengan pemisahan kekuasaan dan supremasi hukum.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Terdapat pembatasan kekuatan negara terhadap perorangan</b> — menjamin negara tidak sewenang-wenang; ini inti negara hukum.<br>• <b>Asas legalitas</b> — setiap tindakan negara harus berdasarkan hukum yang telah ada; fondasi utama negara hukum.<br>• <b>Pemisahan kekuasaan</b> — kekuasaan dibagi antara legislatif, eksekutif, dan yudikatif agar tidak ada penyalahgunaan."},
{id:82,q:"Demokrasi tidak bisa mengajarkannya sendiri. Apabila kekuatan, kemanfaatan dan tanggung jawab demokrasi tidak dipahami dan dihayati dengan baik oleh warga negara, sukar diharapkan mereka mau berjuang untuk mempertahankannya, merupakan pandangan dari....",opts:["Gandal dan Finn","Somantri","Ahmad Sanusi","Winata Putra"],ans:0, exp:"Pernyataan <b>\"demokrasi tidak bisa mengajarkan dirinya sendiri; jika kekuatan dan kemanfaatannya tidak dipahami, warga negara tidak akan mau mempertahankannya\"</b> adalah pandangan dari <b>Gandal dan Finn (1992)</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Somantri</b> — tokoh PKn Indonesia (Nu'man Somantri), tidak dikenal dengan pernyataan spesifik ini.<br>• <b>Ahmad Sanusi</b> — pemikir PKn Indonesia yang fokus pada demokrasi Pancasila, bukan penggagas pernyataan ini.<br>• <b>Winata Putra</b> — tokoh PKn Indonesia yang banyak mengutip berbagai sumber; pernyataan ini bukan dari Winata Putra melainkan dari Gandal dan Finn."},
{id:83,q:"Paradigma pendidikan demokrasi yang perlu dikembangkan dalam lingkungan sekolah adalah pendidikan demokrasi yang bersifat multidimensional. Sifat multidimensionalitasnya itu, antara lain terletak pada berikut ini, kecuali....",opts:["Pandangannya yang pluralistik-uniter (bermacam-macam, tetapi menyatu dalam pengertian Bhineka Tunggal Ika)","Sikapnya dalam menempatkan individu, negara, dan masyarakat global secara harmonis","Tujuannya yang diarahkan pada satu dimensi kecerdasan yaitu rasional","Konteks yang menghasilkan pengalaman belajarnya yang terbuka, fleksibel atau luwes, dan bervariasi"],ans:2, exp:"Paradigma pendidikan demokrasi multidimensional bercirikan: pandangan pluralistik-uniter, menempatkan individu-negara-masyarakat global secara harmonis, dan konteks belajar yang terbuka. Yang <b>bukan</b> ciri: <b>\"tujuannya yang diarahkan pada satu dimensi kecerdasan yaitu rasional\"</b>—justru multidimensional berarti melibatkan dimensi intelektual, afektif, sosial, dan spiritual.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Pandangannya yang pluralistik-uniter</b> — mengakui keberagaman sekaligus menjaga persatuan; ciri multidimensionalitas.<br>• <b>Menempatkan individu, negara, dan masyarakat global secara harmonis</b> — mempertimbangkan berbagai level sosial secara serentak.<br>• <b>Konteks yang menghasilkan pengalaman belajar yang terbuka</b> — keterbukaan konteks memungkinkan berbagai dimensi pengalaman berkembang."},
{id:84,q:"Delik yang berupa pelanggaran terhadap larangan menurut Undang-Undang yang terjadi karena melakukan sesuatu, disebut....",opts:["Delik formal","Delik material","Delik komisi","Delik omisi"],ans:2, exp:"<b>Delik komisi</b> adalah delik yang terjadi karena <b>melakukan sesuatu</b> (tindakan aktif) yang dilarang oleh undang-undang. Contoh: mencuri (aktif mengambil barang orang lain).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Delik formal</b> — delik yang sudah dianggap selesai dengan selesainya perbuatan yang dilarang, tanpa perlu menunggu akibat; berkaitan dengan <i>ada/tidaknya syarat akibat</i>.<br>• <b>Delik material</b> — baru dianggap selesai jika akibat tertentu telah timbul; fokus pada akibat.<br>• <b>Delik omisi</b> — terjadi karena <i>tidak melakukan</i> sesuatu yang seharusnya dilakukan (tindakan pasif); kebalikan dari delik komisi."},
{id:85,q:"Dalam model pembelajaran portofolio, ada beberapa langkah yang diperhatikan oleh siswa dalam mencari informasi di lapangan, yaitu sebagai berikut, kecuali....",opts:["Mengunjungi perpustakaan atau tempat-tempat lain untuk mendapatkan informasi dengan berbekal surat tugas","Menghubungi sumber-sumber informasi melalui telepon","Membuat janji dan mewawancarai orang (narasumber)","Meminta informasi secara paksa kepada narasumber karena waktu yang mendesak"],ans:3, exp:"Yang <b>tidak</b> diperbolehkan dalam mengumpulkan informasi untuk portofolio: <b>meminta informasi secara paksa kepada narasumber karena waktu mendesak</b>. Portofolio menekankan proses yang etis, demokratis, dan menghargai hak orang lain.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Mengunjungi perpustakaan atau tempat-tempat lain</b> — langkah yang sah dan dianjurkan dalam pengumpulan data.<br>• <b>Menghubungi sumber informasi melalui telepon</b> — cara yang etis dan efisien untuk mendapatkan informasi dari narasumber.<br>• <b>Membuat janji dan mewawancarai narasumber</b> — wawancara dengan janji sebelumnya adalah cara yang sopan dan sangat dianjurkan."},
{id:86,q:"Berkaitan dengan landasan pentingnya pendidikan nilai, bahwa mendidik orang hanya bertuju pada pikiran bukan moralnya, sama dengan mendidikkan keburukan kepada masyarakat, merupakan pandangan dari....",opts:["Roosevelt","Bill Honing","Lickona","Bloom"],ans:0, exp:"Pernyataan <b>\"mendidik orang hanya bertuju pada pikiran bukan moralnya sama dengan mendidikkan keburukan kepada masyarakat\"</b> adalah pandangan dari <b>Roosevelt</b> (Theodore Roosevelt). Menegaskan pentingnya pendidikan moral yang tidak boleh dikorbankan demi kecerdasan intelektual.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Bill Honing</b> — dikenal dengan konsep \"bandul pendidikan\" dan <i>ethically illiterate</i>, bukan kutipan ini.<br>• <b>Lickona</b> — tokoh pendidikan karakter (<i>character education</i>), bukan penggagas kutipan ini.<br>• <b>Bloom</b> — terkenal dengan Taksonomi Bloom (domain kognitif, afektif, psikomotorik), bukan dengan pernyataan tentang moral di atas."},
{id:87,q:"Menurut Piaget, tahapan domain kesadaran mengenai aturan, dimana aturan diterima sebagai hasil kesepakatan, yaitu pada usia....",opts:["0-2 tahun","2-8 tahun","8-12 tahun","12-20 tahun"],ans:2, exp:"Menurut Piaget, dalam domain <b>kesadaran mengenai aturan</b>, aturan diterima sebagai <b>hasil kesepakatan</b> pada usia <b>8–12 tahun</b>. Anak sudah memahami bahwa aturan adalah produk kesepakatan bersama yang bisa berubah jika ada persetujuan kolektif.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>0–2 tahun</b> — bayi belum memiliki kesadaran aturan; hanya melakukan gerakan motorik berulang secara refleks.<br>• <b>2–8 tahun</b> — aturan dipandang sebagai sesuatu yang <i>sakral dan tidak bisa diubah</i> (heteronomous morality), bukan kesepakatan.<br>• <b>12–20 tahun</b> — aturan dipahami sebagai konstruksi sosial yang lebih kompleks; tahap otonomi yang lebih matang."},
{id:88,q:"Tujuan dilakukannya kegiatan refleksi adalah....",opts:["Siswa belajar menghindari kesalahan di masa yang akan datang","Siswa dilatih menilai temannya sendiri","Siswa dilatih dapat memberikan angka pada temannya","Siswa dilatih untuk saling berdebat"],ans:0, exp:"Tujuan kegiatan refleksi dalam portofolio: agar <b>siswa belajar menghindari kesalahan di masa yang akan datang</b>. Melalui refleksi, siswa mengevaluasi apa yang sudah dilakukan dan apa yang perlu diperbaiki.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Siswa dilatih menilai temannya sendiri</b> — ini penilaian sejawat (peer assessment), bukan refleksi diri.<br>• <b>Siswa dilatih dapat memberikan angka pada temannya</b> — kegiatan penilaian, bukan refleksi tentang proses belajar sendiri.<br>• <b>Siswa dilatih untuk saling berdebat</b> — latihan argumentasi/berpikir kritis; berbeda dari refleksi yang bersifat introspektif."},
{id:89,q:"Kedalaman muatan kurikulum pada setiap mata pelajaran yang dituangkan dalam kompetensi yang harus dikuasai peserta didik sesuai dengan beban belajar yang tercantum dalam struktur kurikulum, mencerminkan bahwa PKn SD menganut prinsip....",opts:["Belajar sosial","Belajar perubahan perilaku","Belajar tuntas","Belajar kognitif"],ans:2, exp:"Kedalaman muatan kurikulum yang dituangkan dalam kompetensi yang harus dikuasai sesuai beban belajar mencerminkan prinsip <b>belajar tuntas</b> (mastery learning)—setiap siswa diharapkan menguasai kompetensi secara penuh sebelum melanjutkan ke kompetensi berikutnya.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Belajar sosial</b> — teori Bandura yang menekankan pembelajaran melalui observasi dan modelling; tidak berkaitan dengan kedalaman muatan kurikulum.<br>• <b>Belajar perubahan perilaku</b> — pendekatan behavioristik (Skinner); bukan tentang kedalaman kompetensi yang harus dikuasai.<br>• <b>Belajar kognitif</b> — menekankan proses mental internal; meskipun relevan, tidak spesifik merujuk pada pencapaian kompetensi penuh seperti mastery learning."},
{id:90,q:"Potensi dasar mental manusia sebagai dorongan keinginan untuk membuktikan suatu kenyataan, disebut....",opts:["Sense of interest","Sense of curiosity","Sense of reality","Sense of inquiry"],ans:2, exp:"Potensi dasar mental berupa <b>dorongan keinginan untuk membuktikan suatu kenyataan</b> adalah <b>sense of reality</b> menurut Nursid Sumaatmadja. Berbeda dari curiosity (ingin tahu) dan inquiry (ingin menyelidiki), sense of reality fokus pada keinginan membuktikan kebenaran secara konkret.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Sense of interest</b> — dorongan <i>minat/ketertarikan</i> pada suatu objek; ini tahap awal sebelum ingin membuktikan.<br>• <b>Sense of curiosity</b> — dorongan ingin <i>tahu</i> lebih jauh; berbeda dari sense of reality yang ingin <i>membuktikan</i>.<br>• <b>Sense of inquiry</b> — dorongan ingin <i>menyelidiki</i> secara metodis; meski dekat, lebih pada proses penyelidikan bukan pembuktian kenyataan secara spesifik."},
{id:91,q:"Warga negara adalah anggota dari sekelompok manusia yang hidup atau tinggal di wilayah hukum tertentu, merupakan pandangan dari....",opts:["Aristoteles","Plato","Turne","Descartes"],ans:2, exp:"<b>Turne</b> mendefinisikan warga negara sebagai \"anggota dari sekelompok manusia yang hidup atau tinggal di wilayah hukum tertentu\"—menekankan aspek domisili/teritorial sebagai dasar keanggotaan dalam negara.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Aristoteles</b> — mendefinisikan warga negara dalam konteks polis Yunani sebagai orang yang berpartisipasi aktif dalam pemerintahan; berbeda dari definisi berbasis wilayah hukum.<br>• <b>Plato</b> — dalam <i>The Republic</i>, mengklasifikasikan warga negara berdasarkan kemampuan dan perannya dalam negara ideal.<br>• <b>Descartes</b> — filsuf Prancis yang terkenal dengan \"Cogito ergo sum\"; tidak memiliki definisi spesifik tentang kewarganegaraan."},
{id:92,q:"Secara konseptual pendidikan nilai memiliki cakupan yang lebih luas daripada pendidikan moral karena moral lebih tertuju pada ....",opts:["Tata krama sosial","Persoalan baik dan buruk","Salah satu jenis nilai","Peraturan-peraturan"],ans:1, exp:"Cakupan pendidikan nilai lebih luas dari pendidikan moral karena <b>moral lebih tertuju pada persoalan baik dan buruk</b>—dimensi etis tentang tindakan yang benar/salah secara moral. Pendidikan nilai mencakup berbagai jenis nilai: estetis, religius, sosial, budaya, dll.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Tata krama sosial</b> — bagian dari nilai kesopanan/etika sosial; bukan definisi yang menunjukkan batasan cakupan moral.<br>• <b>Salah satu jenis nilai</b> — pernyataan ini benar (moral adalah salah satu jenis nilai), tetapi tidak menjelaskan cakupan moral yang lebih sempit (hanya persoalan baik-buruk).<br>• <b>Peraturan-peraturan</b> — mekanisme sosial/hukum, bukan definisi tentang apa yang dikaji moral."},
{id:93,q:"Menurut Esposito, demokrasi khas Indonesia yang berdasarkan atas prinsip-prinsip Ketuhanan, disebut....",opts:["Teodemokrasi","Teologi","Teokrasi","Demokrasi religius"],ans:0, exp:"<b>Esposito</b> menyebut kekhasan sistem demokrasi Indonesia yang berlandaskan Ketuhanan sebagai <b>teodemokrasi</b>—gabungan \"teo\" (Tuhan) dan \"demokrasi.\" Mencerminkan bahwa demokrasi Indonesia tidak memisahkan aspek keagamaan dari kehidupan bernegara.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Teologi</b> — ilmu tentang Tuhan dan agama secara akademis; bukan istilah untuk sistem demokrasi berketuhanan.<br>• <b>Teokrasi</b> — sistem pemerintahan di mana otoritas tertinggi pada pemuka agama/Tuhan; berbeda dari teodemokrasi yang tetap demokratis namun berpijak pada prinsip Ketuhanan.<br>• <b>Demokrasi religius</b> — Esposito secara spesifik menggunakan istilah \"teodemokrasi,\" bukan \"demokrasi religius.\" "},
{id:94,q:"Sebuah penilaian yang baik adalah penilaian yang dapat menggambarkan secara tepat dan keseluruhan kemampuan siswa, dan merupakan prinsip....",opts:["Objektif","Keterbukaan","Representatif","Keseksamaan"],ans:2, exp:"Penilaian yang dapat <b>menggambarkan secara tepat dan keseluruhan kemampuan siswa</b>—mencakup seluruh aspek dan ranah secara proporsional—adalah penilaian yang <b>representatif</b>. Prinsip ini menjamin tes mewakili seluruh kompetensi yang hendak diukur.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Objektif</b> — berkaitan dengan ketidakberpihakan dalam menilai, bukan soal kelengkapan cakupan penilaian.<br>• <b>Keterbukaan</b> — berkaitan dengan transparansi proses dan hasil penilaian kepada siswa.<br>• <b>Keseksamaan</b> — berkaitan dengan ketelitian dan kecermatan dalam proses penilaian, bukan representativitas cakupan materi."},
{id:95,q:"Dalam kurikulum 1994, istilah Pendidikan Moral Pancasila (PMP) diperbaiki menjadi ...",opts:["Pendidikan Kewarganegaraan Negara","Pendidikan Moral Negara","Pendidikan Kewarganegaraan","Pendidikan Pancasila dan Kewarganegaraan"],ans:3, exp:"Dalam Kurikulum 1994, PMP (Pendidikan Moral Pancasila) diperbarui menjadi <b>PPKn (Pendidikan Pancasila dan Kewarganegaraan)</b>—mengintegrasikan nilai Pancasila dengan materi kewarganegaraan secara lebih komprehensif.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pendidikan Kewarganegaraan Negara</b> — bukan nama resmi; tidak ada mata pelajaran dengan nama ini dalam kurikulum Indonesia.<br>• <b>Pendidikan Moral Negara</b> — bukan nama kurikulum yang pernah ada; PMP digantikan PPKn, bukan \"Pendidikan Moral Negara.\"<br>• <b>Pendidikan Kewarganegaraan</b> — nama yang digunakan kemudian (Kurikulum 2004/KTSP 2006); pada 1994 penggantinya adalah PPKn."},
{id:96,q:"Dalam melaksanakan kewajiban, salah satu aspek yang perlu diperhatikan adalah....",opts:["Aspek kemungkinan bahwa pihak yang berkewajiban sungguh mungkin dan mampu mengemban kewajibannya","Aspek perlindungan hukum yang melegalisir kedudukan pihak yang telah melaksanakan kewajibannya","Aspek pembatasan hukum yang membatasi agar pelaksanaan kewajiban jangan sampai kurang dari batas minimalnya","Aspek pengecualian status yang memuat pertimbangan dalam menghadapi pelaksanaan kewajiban yang tidak memadai"],ans:0, exp:"Dalam melaksanakan kewajiban, aspek penting yang harus diperhatikan: <b>aspek kemungkinan bahwa pihak yang berkewajiban sungguh mungkin dan mampu mengemban kewajibannya</b>. Kewajiban yang mustahil dipenuhi bukan kewajiban yang adil.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Aspek perlindungan hukum yang melegalisir kedudukan</b> — lebih berkaitan dengan aspek hak, bukan kewajiban secara spesifik.<br>• <b>Aspek pembatasan hukum yang membatasi pelaksanaan</b> — berkaitan dengan batas-batas hukum, bukan kemampuan pelaksana kewajiban.<br>• <b>Aspek pengecualian status yang memuat pertimbangan khusus</b> — berkaitan dengan dispensasi; bukan aspek utama pelaksanaan kewajiban secara umum."},
{id:97,q:"Setiap substansi PKn memiliki tuntutan pedagogis berupa pengalaman belajar yang diperlukan untuk....",opts:["Mencapai tujuan PKn","Memenuhi pesan moral PKn","Menggapai visi PKn","Melandasi PKn"],ans:1, exp:"Setiap substansi PKn memiliki tuntutan pedagogis berupa pengalaman belajar untuk <b>memenuhi pesan moral PKn</b>. Ini memastikan setiap materi PKn tidak hanya dipahami secara kognitif, tetapi juga menginternalisasikan nilai dan moral.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Mencapai tujuan PKn</b> — tuntutan pedagogis lebih spesifik menekankan pada pengalaman belajar yang <i>bermakna secara moral</i>, bukan sekadar mencapai tujuan instruksional umum.<br>• <b>Menggapai visi PKn</b> — visi adalah cita-cita jangka panjang yang lebih abstrak; tuntutan pedagogis berkaitan dengan proses konkret.<br>• <b>Melandasi PKn</b> — \"melandasi\" berarti memberi dasar; tuntutan pedagogis bukan tentang memberi landasan, melainkan pengalaman belajar bermakna."},
{id:98,q:"Mata pelajaran Pendidikan Kewarganegaraan merupakan mata pelajaran yang memfokuskan pada....",opts:["Pembentukan warga negara yang memahami dan mampu melaksanakan hak-hak dan kewajibannya untuk menjadi warga negara Indonesia yang cerdas, terampil, dan berkarakter yang diamanatkan oleh Pancasila dan UUD 1945","Pewarisan nilai kepada warga negara agar memahami dan mampu melaksanakan hak-hak dan kewajibannya untuk menjadi warga negara Indonesia yang cerdas, terampil, dan berkarakter","Pendewasaan warga negara agar memahami dan mampu melaksanakan hak-hak dan kewajibannya sebagai warga negara Indonesia yang cerdas, terampil, dan berkarakter","Pengondisian warga negara secara sosial agar memahami dan mampu melaksanakan hak-hak dan kewajibannya untuk menjadi warga negara Indonesia yang cerdas, terampil, dan berkarakter"],ans:0, exp:"PKn merupakan mata pelajaran yang memfokuskan pada <b>pembentukan warga negara yang memahami dan mampu melaksanakan hak-hak dan kewajibannya untuk menjadi warga negara Indonesia yang cerdas, terampil, dan berkarakter yang diamanatkan Pancasila dan UUD 1945</b>. Ini definisi resmi PKn.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pewarisan nilai kepada warga negara</b> — \"pewarisan\" menyiratkan transmisi pasif nilai; PKn lebih aktif dalam <i>membentuk</i> warga negara.<br>• <b>Pendewasaan warga negara</b> — \"pendewasaan\" fokus pada kematangan psikologis, bukan pada hak-kewajiban dan karakter secara komprehensif.<br>• <b>Pengondisian warga negara secara sosial</b> — \"pengondisian\" bernuansa behavioristik yang pasif; PKn menekankan \"pembentukan\" yang aktif dan kritis."},
{id:99,q:"Model pembelajaran portofolio berbasis pada....",opts:["Alam","Masalah","Project","Kebijakan publik"],ans:3, exp:"Model pembelajaran portofolio berbasis pada <b>kebijakan publik</b>. Siswa mengidentifikasi masalah kebijakan, mengkaji alternatif, memilih kebijakan terbaik, dan membuat rencana aksi untuk mempengaruhi kebijakan pemerintah—berorientasi pada proses demokrasi yang nyata.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Alam</b> — pembelajaran berbasis alam (nature-based learning) tidak berkaitan dengan model portofolio PKn yang berfokus kebijakan publik.<br>• <b>Masalah</b> — meskipun portofolio juga mengidentifikasi masalah, dasarnya adalah <i>kebijakan publik</i>. \"Berbasis masalah\" adalah istilah untuk Problem-based Learning (PBL).<br>• <b>Project</b> — project-based learning memiliki output berupa produk konkret; berbeda dari portofolio yang outputnya dokumen kebijakan publik."},
{id:100,q:"Partisipasi politik adalah keterlibatan warga negara dalam kehidupan sistem politik yang disesuaikan dengan kemampuan yang dimiliki masing-masing warga negara, merupakan pandangan dari....",opts:["Huntington dan Nelson","Rush dan Althoff","Mac Andrew","Mas'oed"],ans:1, exp:"Definisi bahwa <b>\"partisipasi politik adalah keterlibatan warga negara dalam kehidupan sistem politik yang disesuaikan dengan kemampuan masing-masing warga negara\"</b> dikemukakan oleh <b>Rush dan Althoff</b>—menekankan penyesuaian kapasitas individual dalam berpartisipasi.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Huntington dan Nelson</b> — mendefinisikan partisipasi politik sebagai kegiatan warga negara yang bertindak sebagai pribadi untuk mempengaruhi pembuatan keputusan; fokus pada tindakan mempengaruhi keputusan, bukan penyesuaian kemampuan.<br>• <b>Mac Andrew</b> — bukan tokoh yang dikenal dengan definisi partisipasi politik yang spesifik dalam kurikulum PKn Indonesia.<br>• <b>Mas'oed</b> — Mohtar Mas'oed adalah ilmuwan hubungan internasional Indonesia; definisinya tidak persis seperti yang dikutip soal ini."},
{id:101,q:"Alat penilaian yang tepat digunakan untuk sikap siswa, adalah sebagai berikut, kecuali....",opts:["Wawancara","Investasi","Kuesioner","Tes unjuk kerja"],ans:3, exp:"Alat penilaian tepat untuk mengukur <b>sikap (afektif)</b>: wawancara, inventori, dan kuesioner. <b>Tes unjuk kerja</b> adalah alat untuk mengukur <b>keterampilan (psikomotorik)</b>—bukan sikap.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Wawancara</b> — dapat digunakan untuk menggali sikap, pendapat, dan perasaan siswa secara mendalam.<br>• <b>Investasi (inventori)</b> — instrumen untuk mengidentifikasi kecenderungan sikap, minat, atau kepribadian.<br>• <b>Kuesioner</b> — instrumen tertulis berisi pertanyaan/pernyataan untuk mengukur sikap, pendapat, atau persepsi siswa."},
{id:102,q:"Langkah penyusunan tes kelas yang ke-2 (dua) menurut Gronlund adalah....",opts:["Determining the purpose of testing","Building a table of specification","Assembling the test","Using the results"],ans:1, exp:"Menurut Gronlund, urutan langkah menyusun tes: (1) Determining the purpose of testing, (2) <b>Building a table of specification</b>, (3) Selecting appropriate item test, (4) Assembling the test, (5) Evaluating the test. Langkah ke-2 adalah <b>Building a table of specification</b> (menyusun kisi-kisi).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Determining the purpose of testing</b> — ini langkah ke-<b>1</b> (menentukan tujuan penilaian).<br>• <b>Assembling the test</b> — ini langkah ke-<b>4</b> (merakit butir soal menjadi tes yang utuh).<br>• <b>Using the results</b> — ini langkah ke-<b>6</b> atau terakhir (menggunakan hasil tes untuk keperluan pembelajaran)."},
{id:103,q:"Hakikat bidang studi PPKn adalah....",opts:["Program pendidikan yang berupaya menanamkan dan melestarikan nilai-nilai Pancasila","Melalui mata pelajaran PPKn siswa dapat menghafal dengan baik nilai-nilai Pancasila","Agar siswa dapat mempraktekkan nilai-nilai luhur tersebut dalam kehidupannya","Agar siswa mendasarkan perilakunya dengan nilai-nilai dan moral Pancasila"],ans:0, exp:"Hakikat bidang studi PPKn adalah <b>\"program pendidikan yang berupaya menanamkan dan melestarikan nilai-nilai Pancasila.\"</b> PPKn bukan sekadar mata pelajaran kognitif, melainkan program pembentukan kepribadian dan karakter warga negara yang berlandaskan Pancasila.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Melalui PPKn siswa dapat menghafal nilai Pancasila</b> — \"menghafal\" bersifat mekanistik dan kognitif rendah; hakikat PPKn jauh lebih dari sekadar hafalan.<br>• <b>Agar siswa dapat mempraktekkan nilai-nilai luhur</b> — hanya menyebut aspek psikomotorik/aplikasi, bukan hakikat menyeluruh PPKn.<br>• <b>Agar siswa mendasarkan perilakunya dengan nilai Pancasila</b> — ini tujuan/hasil akhir, bukan hakikat/substansi program pendidikannya."},
{id:104,q:"Pada orientasi relativis instrumental, berlaku prinsip take and give yang berarti ....",opts:["Hubungannya timbal-balik","Hubungan sebab-akibat","Perasaan takut terhadap akibat","Keinginan untuk mendapat imbalan"],ans:0, exp:"Pada orientasi relativis instrumental (Tahap 2 Kohlberg), berlaku prinsip <i>take and give</i> yang berarti hubungannya <b>timbal-balik</b>—seseorang berbuat baik karena orang lain berbuat baik padanya. Tidak ada keikhlasan murni; semua didasari kalkulasi pertukaran.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Hubungan sebab-akibat</b> — konsep logika/kausalitas, bukan deskripsi tentang motivasi moral timbal-balik.<br>• <b>Perasaan takut terhadap akibat</b> — lebih menggambarkan Tahap 1 (orientasi hukuman), di mana seseorang bertindak baik karena takut hukuman.<br>• <b>Keinginan untuk mendapat imbalan</b> — meski ada kebenarannya, take and give lebih spesifik pada pertukaran (baik dibalas baik), bukan sekadar motif mendapat imbalan sepihak."},
{id:105,q:"Pernyataan di bawah ini merupakan bentuk perilaku yang mendukung terwujudnya integrasi nasional, kecuali....",opts:["Setiap individu/kelompok berhasil mengisi kebutuhan satu sama lainnya baik yang bersifat materi maupun non materi","Tercapainya suatu konsensus mengenai norma-norma dan nilai-nilai sosial","Adanya keselarasan antara individu/kelompok tentang tujuan sosial yang ingin dicapai","Norma-norma yang berlaku dimasyarakat berubah-ubah"],ans:3, exp:"Yang <b>bukan</b> pendukung integrasi nasional: <b>\"norma-norma yang berlaku di masyarakat berubah-ubah\"</b>—ketidakstabilan norma justru mengancam kohesi sosial yang dibutuhkan integrasi.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Setiap individu/kelompok berhasil mengisi kebutuhannya</b> — pemenuhan kebutuhan menciptakan kepuasan dan mengurangi konflik, mendukung integrasi.<br>• <b>Tercapainya suatu konsensus mengenai norma-norma</b> — kesepakatan norma bersama adalah fondasi integrasi sosial.<br>• <b>Adanya keselarasan antara individu/kelompok tentang tujuan</b> — kesamaan tujuan mengarahkan energi kolektif dan mencegah perpecahan."},
{id:106,q:"Negara menghormati dan memelihara bahasa daerah sebagai kekayaan budaya nasional, tercantum dalam UUD 1945 pasal....",opts:["31","32","33","34"],ans:1, exp:"Pernyataan \"Negara menghormati dan memelihara bahasa daerah sebagai kekayaan budaya nasional\" ada dalam UUD 1945 <b>Pasal 32</b>—pasal yang mengatur kebudayaan nasional Indonesia.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pasal 31</b> — tentang pendidikan (\"Setiap warga negara berhak mendapat pendidikan\"), bukan bahasa daerah.<br>• <b>Pasal 33</b> — tentang perekonomian nasional (\"Perekonomian disusun sebagai usaha bersama...\"), bukan bahasa daerah.<br>• <b>Pasal 34</b> — tentang fakir miskin dan jaminan sosial yang dipelihara negara, bukan bahasa daerah."},
{id:107,q:"Berdasarkan UU No. 7 tahun 1989, bahwa peradilan yang bertugas dan berwenang memeriksa perkara di tingkat pertama antara orang-orang yang beragama Islam di bidang perkawinan, kewarisan, wasiat, dan hibah serta wakaf dan shadaqah, adalah peradilan....",opts:["Agama","Umum","Militer","Tata usaha negara"],ans:0, exp:"Berdasarkan UU No. 7 Tahun 1989, peradilan yang memeriksa perkara antara orang-orang beragama Islam di bidang perkawinan, kewarisan, wakaf, dan shadaqah adalah <b>Peradilan Agama</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Umum (Peradilan Umum)</b> — mengadili perkara perdata dan pidana umum untuk semua golongan, bukan khusus perkara agama Islam.<br>• <b>Militer</b> — mengadili perkara pidana yang dilakukan anggota militer (TNI).<br>• <b>Tata usaha negara</b> — mengadili sengketa administrasi antara warga dan pejabat/badan pemerintah."},
{id:108,q:"Tari O Inanikeke berasal dari daerah....",opts:["Tapanuli","Sulawesi Utara","Jawa Barat","Jawa Tengah"],ans:1, exp:"<b>Tari O Inanikeke</b> adalah tarian tradisional dari <b>Sulawesi Utara</b>, khususnya dari suku Minahasa—sama seperti Tari Maengket. Merupakan salah satu kekayaan budaya daerah Sulawesi Utara.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Tapanuli</b> — daerah di Sumatra Utara dengan budaya Batak dan tarian Tor-tor; bukan asal Tari O Inanikeke.<br>• <b>Jawa Barat</b> — terkenal dengan tarian Sunda seperti Tari Jaipong dan Tari Merak; bukan asal tari ini.<br>• <b>Jawa Tengah</b> — terkenal dengan tarian Jawa seperti Tari Bedhaya dan Tari Serimpi; bukan asal tari ini."},
{id:109,q:"Dampak teknologi manusia yang berkembang selama berabad-abad menghasilkan peradaban yang berbeda. Di wilayah pedalaman Kalimantan, lahan belum digarap, penduduknya jarang, hidupnya berpindah-pindah (nomaden). Hal tersebut merupakan latar belakang kemajemukan bangsa ditinjau dari aspek....",opts:["Historis","Geografis","Sosiologi dan kultural","Politis"],ans:1, exp:"Dampak teknologi manusia yang berkembang berbeda-beda menghasilkan peradaban yang berbeda di tiap wilayah—ini latar belakang kemajemukan dari aspek <b>geografis</b>. Kondisi dan aksesibilitas wilayah yang berbeda mempengaruhi perkembangan teknologi dan peradaban.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Historis</b> — berkaitan dengan peristiwa sejarah yang dilalui, bukan perbedaan akses teknologi akibat kondisi geografis.<br>• <b>Sosiologi dan kultural</b> — berkaitan dengan proses adaptasi sosial-budaya nenek moyang, bukan langsung pada dampak teknologi dan kondisi geografis.<br>• <b>Politis</b> — berkaitan dengan kekuasaan dan kebijakan negara; tidak langsung menjelaskan perbedaan peradaban akibat kondisi geografis."},
{id:110,q:"Menurut Pasal 4 UU No. 8/1981 tentang UU Hukum Acara Pidana (KUHAP), penyelidik adalah....",opts:["Setiap pejabat polisi negara RI","Setiap Pengacara","Setiap Jaksa","Setiap Hakim"],ans:0, exp:"Menurut Pasal 4 UU No. 8/1981 (KUHAP), penyelidik adalah <b>setiap pejabat polisi negara Republik Indonesia</b>. Penyelidik bertugas mencari dan menemukan apakah suatu peristiwa adalah tindak pidana.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Setiap Pengacara</b> — pengacara/advokat berperan membela klien, bukan melakukan penyelidikan.<br>• <b>Setiap Jaksa</b> — jaksa berperan sebagai penuntut umum setelah penyidikan selesai; bukan penyelidik di lapangan.<br>• <b>Setiap Hakim</b> — hakim berperan mengadili perkara di pengadilan, bukan melakukan penyelidikan."},
{id:111,q:"Cara yang digunakan guru dalam menjelaskan karakteristik bidang studi PPKn antara lain melalui pembelajaran yang mungkin terjadi, langkah tertentu dalam suatu pembelajaran termasuk aspek ....",opts:["Proses pembelajaran","Strategi pembelajaran","Metode pembelajaran","Teknik pembelajaran"],ans:2, exp:"Cara guru menjelaskan karakteristik PPKn melalui pembelajaran yang mungkin terjadi dan langkah tertentu dalam pembelajaran termasuk aspek <b>metode pembelajaran</b>—cara atau prosedur yang digunakan guru dalam menyampaikan materi agar siswa memahaminya.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Proses pembelajaran</b> — ini keseluruhan rangkaian kegiatan belajar mengajar; lebih luas dari metode.<br>• <b>Strategi pembelajaran</b> — rencana umum atau pendekatan besar dalam mengajar; lebih abstrak dari metode.<br>• <b>Teknik pembelajaran</b> — implementasi paling konkret/spesifik dari metode; lebih operasional dari apa yang dimaksud soal."},
{id:112,q:"Model pembelajaran dengan pemanduan sejumlah tema (topik) pembelajaran dari mata pelajaran yang berbeda tetapi esensinya sama dalam sebuah topik/tema tertentu, adalah model....",opts:["Webbed","Connected","Integrated","Fragmented"],ans:2, exp:"Model <b>integrated</b> memadukan sejumlah tema/topik dari berbagai mata pelajaran berbeda yang memiliki esensi atau konsep yang sama ke dalam satu tema terpadu.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Webbed</b> — menggunakan tema sebagai pengikat berbagai mata pelajaran dari luar; berbeda dari integrated yang menyatukan berdasarkan kesamaan esensi konsep antar disiplin.<br>• <b>Connected</b> — menghubungkan topik-topik dalam <i>satu</i> mata pelajaran, bukan lintas disiplin.<br>• <b>Fragmented</b> — memisahkan mata pelajaran secara ketat tanpa integrasi; berlawanan total dengan integrated."},
{id:113,q:"Berikut ini merupakan isi dari portofolio kelas, kecuali....",opts:["Peta","Grafik","Karya seni","Pernyataan lisan seorang guru"],ans:3, exp:"Isi portofolio kelas dapat berupa peta, grafik, karya seni, diagram, artikel, dll. Yang <b>bukan</b> isi portofolio: <b>pernyataan lisan seorang guru</b>—portofolio berisi karya/dokumen yang dihasilkan oleh <i>siswa</i>, bukan pernyataan guru. Selain itu, portofolio bersifat tertulis/visual, bukan lisan.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Peta</b> — peta yang menunjukkan lokasi isu kebijakan publik dapat menjadi isi portofolio.<br>• <b>Grafik</b> — grafik yang menggambarkan data terkait isu yang dikaji adalah bagian dari portofolio.<br>• <b>Karya seni</b> — gambar atau ilustrasi yang dibuat siswa untuk mendukung penyampaian isu dapat dimasukkan dalam portofolio."},
{id:114,q:"Keterkaitan antara PPKn dengan IPS terbentuk secara historis yang artinya ...",opts:["Pada awalnya PPKn merupakan bagian dari IPS","Menurut kurikulumnya materi pelajaran PPKn termasuk dalam IPS","Menurut sumber mata pelajaran PPKn bersumber dari IPS","Menurut materi pelajarannya PPKn memiliki kaitan erat dengan IPS"],ans:0, exp:"Keterkaitan antara PPKn dengan IPS bersifat historis berarti <b>pada awalnya PPKn merupakan bagian dari IPS</b>. Dalam Kurikulum SD 1968, Civics merupakan komponen IPS bersama Ilmu Bumi dan Sejarah—baru kemudian berkembang menjadi mata pelajaran tersendiri.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Menurut kurikulumnya materi pelajaran PPKn termasuk dalam IPS</b> — tidak benar untuk kurikulum saat ini; PPKn sudah lama menjadi mata pelajaran tersendiri.<br>• <b>Menurut sumber mata pelajaran PPKn bersumber dari IPS</b> — PPKn memiliki sumber tersendiri (konstitusi, nilai Pancasila) meski ada irisan dengan IPS.<br>• <b>Menurut materi pelajarannya PPKn memiliki kaitan erat dengan IPS</b> — meski ada keterkaitan materi, ini bukan penjelasan tentang keterkaitan <i>historis</i> yang dimaksud soal."},
{id:115,q:"Ras Mongoloid mempunyai ciri fisik, yaitu....",opts:["Rambut keriting, bibir tebal, dan kulit hitam","Perawakan kecil, kulit sawo matang, dan rambut berombak","Rambut lurus atau ikal, muka agak bulat, kulit putih sampai sawo matang","Badan besar, warna kulit merah, dan bibir tebal"],ans:2, exp:"Ciri fisik ras Mongoloid: <b>rambut lurus atau ikal, muka agak bulat, kulit putih sampai sawo matang</b>. Sebagian besar penduduk kepulauan Indonesia (Sub-ras Melayu Mongoloid) memiliki ciri ini.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Rambut keriting, bibir tebal, dan kulit hitam</b> — ciri ras <b>Negroid</b> (Afrika Sub-Sahara), bukan Mongoloid.<br>• <b>Perawakan kecil, kulit sawo matang, dan rambut berombak</b> — ciri ras <b>Weddoid</b> (orang Kubu, Sakai, Mentawai).<br>• <b>Badan besar, warna kulit merah, dan bibir tebal</b> — lebih menggambarkan ciri <b>Amerindian</b> (penduduk asli Amerika) atau Kaukasoid tertentu, bukan Mongoloid."},
{id:116,q:"Hubungan PPKn dengan mata pelajaran lainnya terletak pada syarat-syarat umum yang diperlukan untuk mempelajari pelajaran dengan baik kepada murid, yang berupa ....",opts:["Didaktik","Metodik","Implikatif","Deduktif"],ans:0, exp:"Hubungan PPKn dengan mata pelajaran lainnya terletak pada syarat-syarat umum yang diperlukan dalam belajar dengan baik—berupa <b>didaktik</b>—ilmu tentang cara mendidik/mengajar secara umum yang menjadi landasan semua mata pelajaran.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Metodik</b> — penerapan didaktik pada mata pelajaran tertentu (metodik khusus); lebih spesifik pada satu mata pelajaran.<br>• <b>Implikatif</b> — bukan istilah baku dalam ilmu pendidikan yang menggambarkan hubungan antar mata pelajaran.<br>• <b>Deduktif</b> — metode berpikir/bernalar (dari umum ke khusus); bukan istilah hubungan antar mata pelajaran dalam konteks didaktik."},
{id:117,q:"Hak atas kebebasan pribadi, misalnya....",opts:["Memilih status kewarganegaraan","Persamaan di depan hukum","Perlindungan dari eksploitasi pekerjaan","Perlindungan terhadap penyiksaan"],ans:0, exp:"Contoh <b>hak atas kebebasan pribadi</b>: <b>memilih status kewarganegaraan</b>—hak yang berkaitan dengan identitas hukum dan kebebasan menentukan keanggotaan seseorang dalam suatu negara; keputusan yang sangat personal.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Persamaan di depan hukum</b> — ini <b>hak sipil dan politik</b>, berkaitan dengan kesetaraan dalam sistem hukum.<br>• <b>Perlindungan dari eksploitasi pekerjaan</b> — ini <b>hak ekonomi dan sosial</b> (hak tenaga kerja).<br>• <b>Perlindungan terhadap penyiksaan</b> — ini hak atas keselamatan dan integritas fisik."},
{id:118,q:"Dalam pembelajaran tematik terdapat beberapa hal yang perlu mendapat perhatian, kecuali....",opts:["Pembelajaran tematik dimaksudkan agar pelaksanaan kegiatan pembelajaran menjadi lebih bermakna dan utuh","Dalam pelaksanaan pembelajaran tematik perlu mempertimbangkan alokasi waktu setiap tema dan memperhitungkan banyak sedikitnya bahan di lingkungan","Usahakan pilihan tema yang terdekat dengan anak","Lebih mengutamakan tema daripada kompetensi dasar yang akan dicapai"],ans:3, exp:"Dalam pembelajaran tematik, hal yang <b>salah</b>: <b>\"lebih mengutamakan tema daripada kompetensi dasar.\"</b> Tema hanyalah wahana/alat untuk mencapai kompetensi dasar—KD tetap tujuan utama yang harus dicapai, bukan tema.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Dimaksudkan agar pelaksanaan lebih bermakna</b> — tujuan utama pendekatan tematik; kebermaknaan adalah prinsip yang harus diperhatikan.<br>• <b>Perlu mempertimbangkan alokasi waktu</b> — hal praktis yang harus diperhatikan agar semua KD dapat dicapai.<br>• <b>Usahakan pilihan tema yang terdekat dengan anak</b> — tema kontekstual dan dekat kehidupan siswa membuat pembelajaran lebih bermakna."},
{id:119,q:"Untuk menjelaskan penerapan konsep Wawasan Nusantara melalui contoh, guru perlu mengimplementasikannya dalam ....",opts:["Rencana dan sumber belajar","Media belajar-mengajar","Buku pelajaran wajib","Rencana pembelajaran"],ans:1, exp:"Untuk menjelaskan penerapan konsep Wawasan Nusantara melalui contoh, guru perlu mengimplementasikannya dalam <b>media belajar-mengajar</b>—media pembelajaran (peta, video, gambar, model) memungkinkan guru menyajikan contoh-contoh konkret dan visual.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Rencana dan sumber belajar</b> — rencana pembelajaran adalah dokumen persiapan, bukan cara menyajikan contoh; sumber belajar lebih luas dari media.<br>• <b>Buku pelajaran wajib</b> — salah satu sumber belajar, tetapi tidak seefektif media dalam menyajikan contoh visual dan interaktif.<br>• <b>Rencana pembelajaran</b> — RPP adalah dokumen persiapan mengajar; bukan instrumen untuk menyajikan contoh kepada siswa."},
{id:120,q:"Piagam HAM yang lahir pada tanggal 10 Desember 1948 dinamakan....",opts:["Declaration of Independent","Bill of Right","Declaration of Universal Human Right","Universal Declaration of Human Right"],ans:3, exp:"Piagam HAM yang lahir tanggal 10 Desember 1948 dinamakan <b>Universal Declaration of Human Rights</b> (Deklarasi Universal Hak-Hak Asasi Manusia)—diadopsi Majelis Umum PBB, memuat 30 pasal tentang hak-hak dasar manusia.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Declaration of Independent</b> — Deklarasi Kemerdekaan Amerika Serikat (1776), bukan piagam HAM internasional PBB 1948.<br>• <b>Bill of Right</b> — dokumen HAM Amerika Serikat (10 amendemen pertama Konstitusi AS, 1791), bukan produk PBB 1948.<br>• <b>Declaration of Universal Human Right</b> — urutan kata kurang tepat; yang benar adalah <b>\"Universal Declaration of Human Rights\"</b>."},
{id:121,q:"Pendekatan emosional bertujuan untuk menggugah perasaan dan emosi siswa dalam memahami, menghayati dan meyakini nilai yang akan ditanamkan, sedangkan pendekatan rasional bertujuan untuk ....",opts:["Memberikan peranan kepada akal dalam memahami dan menerima kebenaran nilai tersebut","Melatih siswa untuk berpikir secara logis dalam menangani suatu masalah","Membekali siswa agar memiliki pengetahuan dan keterampilan","Melatih siswa untuk belajar bertanggungjawab baik dalam hidup bermasyarakat maupun bernegara"],ans:0, exp:"Soal menanyakan tujuan pendekatan <b>rasional</b>. Jawabannya: <b>\"memberikan peranan kepada akal dalam memahami dan menerima kebenaran nilai.\"</b> Pendekatan rasional menggunakan logika dan penalaran untuk membantu siswa menerima nilai secara intelektual.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Melatih siswa untuk berpikir secara logis</b> — meskipun ada unsur logis, ini mendeskripsikan tujuan umum berpikir kritis, bukan spesifik peran akal dalam menerima nilai.<br>• <b>Membekali siswa agar memiliki pengetahuan dan keterampilan</b> — tujuan pendekatan <i>kognitif/didaktik</i>, bukan pendekatan rasional dalam pendidikan nilai.<br>• <b>Melatih siswa untuk belajar bertanggung jawab</b> — lebih berkaitan dengan pendekatan <i>kooperatif/sosial</i>, bukan pendekatan rasional."},
{id:122,q:"Terbiasa beribadah dengan rasa tulus ikhlas tanpa pamrih, selalu menyediakan diri untuk membantu orang lain, selalu merasa terpanggil untuk berbuat bila melihat sesuatu yang kurang sesuai, mengandung nilai....",opts:["Rasa memiliki","Setia","Rela berkorban","Pengabdian"],ans:3, exp:"Terbiasa beribadah tulus ikhlas tanpa pamrih, selalu menyediakan diri untuk membantu orang lain, dan selalu merasa terpanggil saat melihat sesuatu yang kurang sesuai mencerminkan nilai <b>pengabdian</b>—dedikasi total tanpa mengharapkan imbalan, didorong rasa tanggung jawab yang mendalam.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Rasa memiliki</b> — mendorong seseorang melindungi \"miliknya\"; berbeda dari pengabdian yang bersifat aktif melayani tanpa pamrih.<br>• <b>Setia</b> — kesetiaan (loyalitas) adalah keteguhan untuk tidak mengkhianati; berbeda dari pengabdian yang bermakna melayani secara aktif dan penuh dedikasi.<br>• <b>Rela berkorban</b> — berkonotasi pengorbanan dalam situasi darurat/krisis; pengabdian bersifat kontinu dalam kehidupan sehari-hari."},
{id:123,q:"Usaha pertahanan dan keamanan negara dilaksanakan melalui sistem pertahanan dan keamanan rakyat semesta dengan ketentuan, yaitu....",opts:["TNI dan POLRI sebagai kekuatan utama, dan rakyat sebagai kekuatan pendukung","TNI dan POLRI sebagai kekuatan pendukung dan rakyat sebagai kekuatan utama","TNI, POLRI dan rakyat sebagai kekuatan utama","TNI sebagai kekuatan utama, POLRI dan rakyat sebagai kekuatan pendukung"],ans:0, exp:"Pasal 30 ayat (2) UUD 1945: sistem pertahanan rakyat semesta dengan ketentuan <b>TNI dan POLRI sebagai kekuatan utama, dan rakyat sebagai kekuatan pendukung</b>—TNI-POLRI adalah tulang punggung pertahanan dengan rakyat sebagai pendukungnya.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>TNI dan POLRI sebagai kekuatan pendukung dan rakyat sebagai kekuatan utama</b> — terbalik; dalam sistem pertahanan formal, TNI-POLRI adalah kekuatan utama.<br>• <b>TNI, POLRI dan rakyat sebagai kekuatan utama</b> — rakyat secara konstitusional adalah kekuatan <i>pendukung</i>, bukan kekuatan utama yang setara.<br>• <b>TNI sebagai kekuatan utama, POLRI dan rakyat sebagai kekuatan pendukung</b> — memisahkan POLRI dari TNI; konstitusi menyebut TNI dan POLRI bersama-sama sebagai kekuatan utama."},
{id:124,q:"Untuk menjelaskan pengertian warganegara sesuai dengan sumbernya, seorang guru perlu menggunakan pendekatan ....",opts:["Interaktif","Komperatif","Normatif","Nominatif"],ans:2, exp:"Untuk menjelaskan pengertian warga negara sesuai sumbernya (peraturan perundang-undangan), guru perlu menggunakan pendekatan <b>normatif</b>—mendasarkan penjelasan pada norma-norma hukum yang berlaku, seperti UU Kewarganegaraan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Interaktif</b> — menekankan interaksi dua arah dalam pembelajaran; bukan cara menjelaskan berdasarkan sumber hukum.<br>• <b>Komperatif</b> — membandingkan antara satu hal dengan hal lain; bukan cara menjelaskan berdasarkan peraturan perundang-undangan.<br>• <b>Nominatif</b> — merujuk pada \"nama\" (dalam tata bahasa); bukan pendekatan pembelajaran yang valid untuk menjelaskan pengertian hukum."},
{id:125,q:"Demokrasi sebagai salah satu bentuk pemerintahan, demokrasi sebagai suatu landasan pelaksanaan kekuasaan tertinggi ditangan rakyat, dan demokrasi adalah konsep republik sebagai bentuk pemerintahan yang murni, merupakan pandangan dari....",opts:["Udin S Winataputra","Achmad Sanusi","Miriam Budiarjo","Torres"],ans:3, exp:"Tiga pandangan tentang demokrasi—sebagai bentuk pemerintahan, sebagai landasan kekuasaan di tangan rakyat, dan sebagai konsep republik yang murni—merupakan pandangan dari <b>Torres</b>. Winataputra dan Sanusi mengutip Torres, tetapi pandangan itu berasal dari Torres.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Udin S Winataputra</b> — guru besar PKn Indonesia yang banyak menulis tentang pendidikan demokrasi; beliau mengutip Torres tetapi bukan sumber aslinya.<br>• <b>Achmad Sanusi</b> — ilmuwan pendidikan Indonesia yang mengkaji demokrasi dalam konteks Indonesia; bukan sumber asli pandangan Torres.<br>• <b>Miriam Budiarjo</b> — ilmuwan ilmu politik Indonesia terkenal dengan \"Dasar-Dasar Ilmu Politik\"; pandangannya tentang demokrasi berbeda dari Torres."},
{id:126,q:"Pernyataan di bawah ini yang merupakan tugas dan wewenang Komnas HAM dalam fungsi pemantauan adalah....",opts:["Mengkaji dan meneliti berbagai instrumen internasional HAM dengan tujuan memberikan saran-saran mengenai kemungkinan aksesi dan atau retifikasi","Pembahasan berbagai masalah yang berkaitan dengan perlindungan, penegakan, dan pemajuan HAM","Pemanggilan kepada pihak pengadu atau korban maupun pihak yang diadukan untuk dimintai dan didengar keterangannya","Penyebarluasan wawasan mengenai HAM kepada masyarakat"],ans:2, exp:"Tugas dan wewenang Komnas HAM dalam fungsi <b>pemantauan</b> (Pasal 89) salah satunya: <b>pemanggilan kepada pihak pengadu atau korban maupun pihak yang diadukan untuk dimintai dan didengar keterangannya</b>—bagian dari penyelidikan dan pemantauan pelaksanaan HAM.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Mengkaji dan meneliti berbagai instrumen internasional mengenai HAM</b> — ini fungsi <i>pengkajian dan penelitian</i>, bukan pemantauan.<br>• <b>Pembahasan berbagai masalah yang berkaitan dengan HAM</b> — ini fungsi <i>penyuluhan</i> atau kajian umum, bukan pemantauan.<br>• <b>Penyebarluasan wawasan mengenai HAM kepada masyarakat</b> — ini fungsi <i>penyuluhan</i> Komnas HAM."},
{id:127,q:"Persatuan Indonesia atau nasionalisme Indonesia telah berhasil mengikat bangsa Indonesia untuk merebut, mempertahankan, dan mengisi kemerdekaan. Rintisan awal terbentuknya rasa persatuan Indonesia diwujudkan dalam....",opts:["Keputusan Kongres Pemuda Indonesia","Proklamasi Kemerdekaan Indonesia","Sila Persatuan Indonesia","Pembukaan UUD 1945 alinea ketiga"],ans:0, exp:"Rintisan awal terbentuknya rasa persatuan Indonesia diwujudkan dalam <b>Keputusan Kongres Pemuda Indonesia</b> (Sumpah Pemuda, 28 Oktober 1928)—menyatakan satu bangsa, satu tanah air, satu bahasa.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Proklamasi Kemerdekaan Indonesia</b> — terjadi 1945; ini puncak perjuangan, bukan rintisan awal persatuan.<br>• <b>Sila Persatuan Indonesia</b> — Pancasila baru 1945; rintisan persatuan sudah ada sejak Sumpah Pemuda 1928.<br>• <b>Pembukaan UUD 1945 alinea ketiga</b> — pun produk 1945, bukan rintisan awal."},
{id:128,q:"Paham bangsa timbul karena persamaan perangai dan tingkah laku dalam memperjuangkan persatuan dan nasib yang sama, merupakan pandangan tentang nasionalisme menurut....",opts:["Joseph Ernest Renant","Otto Bauar","Dr. Hertz","L. Stoddard"],ans:1, exp:"Pandangan bahwa <b>\"bangsa timbul karena persamaan perangai dan tingkah laku dalam memperjuangkan persatuan dan nasib yang sama\"</b> adalah pandangan dari <b>Otto Bauer</b>—menekankan kesamaan karakter yang terbentuk melalui perjuangan nasib bersama.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Joseph Ernest Renant</b> — Renan menekankan \"keinginan untuk hidup bersama\" (<i>le désir de vivre ensemble</i>), bukan persamaan perangai.<br>• <b>Dr. Hertz</b> — membahas nasionalisme dari aspek sejarah dan kondisi sosial, tidak spesifik tentang persamaan perangai.<br>• <b>L. Stoddard</b> — menekankan \"kepercayaan kolektif tentang rasa kebangsaan,\" bukan persamaan perangai dan perjuangan nasib."},
{id:129,q:"Masih seringnya terjadi pelanggaran HAM di Indonesia disebabkan oleh....",opts:["Kondisi perekonomian masyarakat sebagian besar berada di bawah garis kemiskinan","Lemahnya upaya penegakan hukum","Tidak seimbangnya jumlah aparat keamanan","Tiadanya peraturan yang memberikan jaminan perlindungan HAM"],ans:1, exp:"Masih seringnya terjadi pelanggaran HAM di Indonesia disebabkan oleh <b>lemahnya upaya penegakan hukum</b>. Peraturan HAM sudah ada (UU No. 39/1999), tetapi tanpa penegakan yang tegas dan konsisten, pelanggaran terus terjadi.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kondisi perekonomian sebagian besar di bawah garis kemiskinan</b> — kemiskinan bisa jadi faktor, tetapi bukan penyebab utama; pelanggaran HAM juga terjadi terhadap orang yang mampu.<br>• <b>Tidak seimbangnya jumlah aparat keamanan</b> — rasio aparat-penduduk mungkin berpengaruh, tetapi bukan penyebab utama pelanggaran HAM yang bersifat sistemik.<br>• <b>Tiadanya peraturan yang memberikan jaminan perlindungan HAM</b> — tidak benar; Indonesia sudah memiliki UU No. 39/1999, UU Pengadilan HAM (26/2000), dan Komnas HAM."},
{id:130,q:"Ancaman pidana yang memberatkan bagi pelaku perampokan antara lain diancam dalam KUHP pada Pasal 339, Pasal 354, Pasal 368 Jo Pasal 365 dan....",opts:["Pasal 355","Pasal 378","Pasal 395","Pasal 342"],ans:0, exp:"Ancaman pidana yang memberatkan bagi pelaku perampokan antara lain diatur dalam <b>Pasal 355 KUHP</b>—mengatur penganiayaan berat berencana, yang berlaku jika dalam perampokan terjadi penganiayaan berat yang direncanakan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pasal 378</b> — mengatur penipuan (menggerakkan orang menyerahkan barang dengan tipu muslihat), bukan perampokan dengan kekerasan.<br>• <b>Pasal 395</b> — tidak ada pasal 395 dalam KUHP yang relevan dengan pemberatan pidana perampokan.<br>• <b>Pasal 342</b> — mengatur pembunuhan berencana terhadap anak sendiri; tidak relevan dengan pemberatan pidana perampokan."},
{id:131,q:"Setiap tindakan negara harus berdasarkan hukum yang telah diadakan terlebih dahulu yang harus ditaati juga oleh pemerintah atau aparatnya, hal ini merupakan salah satu ciri atau unsur negara hukum, yaitu....",opts:["Asas oportunis","Asas legalitas","Asas demokrasi","Asas ius sanguinis"],ans:1, exp:"Prinsip bahwa <b>setiap tindakan negara harus berdasarkan hukum yang telah diadakan terlebih dahulu dan harus ditaati oleh pemerintah/aparatnya</b> disebut <b>asas legalitas</b>—melarang penerapan hukum secara retroaktif dan menjamin kepastian hukum.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Asas oportunis</b> — bukan asas yang valid dalam hukum tata negara.<br>• <b>Asas demokrasi</b> — berkaitan dengan kedaulatan rakyat dan partisipasi warga; bukan tentang keharusan berdasarkan hukum yang telah ada.<br>• <b>Asas ius sanguinis</b> — asas kewarganegaraan berdasarkan keturunan (darah); tidak ada hubungannya dengan keharusan bertindak berdasarkan hukum."},
{id:132,q:"Pendidikan demokrasi dilihat dari segi tujuan dan konteks merupakan....",opts:["Esensi pendidikan politik","Esensi Pendidikan Kewarganegaraan","Esensi dari upaya demokratisasi","Esensi pemerintahan yang menggunakan sistem demokrasi"],ans:0, exp:"Pendidikan demokrasi dilihat dari segi tujuan dan konteks merupakan <b>esensi pendidikan politik</b>—tujuan utamanya membentuk warga negara yang melek politik, memahami hak-hak politiknya, dan mampu berpartisipasi secara aktif dan bertanggung jawab dalam kehidupan demokratis.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Esensi Pendidikan Kewarganegaraan</b> — PKn memang mengandung pendidikan demokrasi, tetapi dari segi tujuan dan konteks, lebih tepat disebut esensi pendidikan politik.<br>• <b>Esensi dari upaya demokratisasi</b> — demokratisasi adalah proses sistemik penerapan demokrasi; berbeda dari pendidikan demokrasi yang merupakan proses pembelajaran.<br>• <b>Esensi pemerintahan yang menggunakan sistem demokrasi</b> — ini merujuk pada sistem pemerintahan, bukan proses pendidikan warga negara."},
{id:133,q:"Model pengembangan sikap demokratis dan bertanggung jawab yang dilakukan melalui pertemuan saling bertanya dan menjawab secara bergiliran, adalah strategi....",opts:["Pertemuan kelas berita baru","Cambuk bersiklus","Waktu untuk penghargaan","Pertemuan perumusan tujuan"],ans:1, exp:"<b>Cambuk bersiklus</b> adalah model pengembangan sikap demokratis di mana siswa <b>saling bertanya dan menjawab secara bergiliran</b>—melatih kemampuan dialog demokratis: setiap orang mendapat giliran berbicara dan mendengarkan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pertemuan kelas berita baru</b> — strategi membahas berita aktual dari media massa; bukan tanya-jawab bergiliran.<br>• <b>Waktu untuk penghargaan</b> — memberikan waktu khusus untuk menghargai kontribusi positif siswa; bukan tanya-jawab bergiliran.<br>• <b>Pertemuan perumusan tujuan</b> — digunakan untuk menyusun tujuan belajar bersama; bukan tanya-jawab bergiliran."},
{id:134,q:"Delik yang dianggap telah sepenuhnya terlaksana dengan dilakukannya suatu perbuatan yang dilarang dan diancam dengan hukuman oleh Undang-Undang disebut....",opts:["Delik formal","Delik material","Delik komisi","Delik omisi"],ans:0, exp:"<b>Delik formal</b> adalah delik yang dianggap <b>sudah sepenuhnya terlaksana</b> hanya dengan dilakukannya perbuatan yang dilarang, tanpa perlu menunggu akibat. Contoh: menyebarkan berita bohong—begitu disebarkan, delik sudah selesai.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Delik material</b> — baru dianggap selesai jika <i>akibat tertentu</i> telah timbul (misal: kematian pada pembunuhan).<br>• <b>Delik komisi</b> — terjadi karena <i>melakukan</i> tindakan yang dilarang (aktif); berkaitan dengan jenis tindakan, bukan apakah perlu ada akibat.<br>• <b>Delik omisi</b> — terjadi karena <i>tidak melakukan</i> sesuatu yang seharusnya dilakukan (pasif); kebalikan dari delik komisi."},
{id:135,q:"Dalam mengumpulkan berbagai informasi yang diperlukan siswa, sebaiknya orang yang membantunya tidak....",opts:["Menyurati atau menelepon","Membuat ilustrasi","Membuat grafik","Menuliskan bahan-bahan yang akan disajikan dalam portofolio"],ans:3, exp:"Yang <b>tidak boleh dilakukan</b> pembantu siswa dalam mengumpulkan informasi: <b>menuliskan bahan-bahan yang akan disajikan dalam portofolio</b>—portofolio harus merupakan karya asli siswa; bantuan menulis konten mengaburkan keaslian karya dan proses belajar siswa.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Menyurati atau menelepon</b> — pembantu dapat membantu menghubungi narasumber secara logistik.<br>• <b>Membuat ilustrasi</b> — pembantu boleh membantu ilustrasi teknis (bukan konten akademis utama).<br>• <b>Membuat grafik</b> — pembantu boleh membantu visualisasi data yang sudah dikumpulkan siswa."},
{id:136,q:"Bandul telah berayun kembali dari ide romantika yang memandang bahwa semua nilai kemasyarakatan adalah ancaman. Para pendidik telah lama mengikuti masa kegilaan itu, yang pada akhirnya berujung pada peserta didik ethically illiterate. Merupakan pandangan tentang pendidikan moral menurut....",opts:["Honing","Bloom","Lickona","Jean Piaget"],ans:0, exp:"Pandangan tentang \"bandul pendidikan\" yang setelah era romantika kembali ke nilai kemasyarakatan namun berujung pada siswa yang <i>ethically illiterate</i> (buta etika) adalah pandangan dari <b>Honing (Bill Honing)</b>—tokoh pendidikan yang mengkritik pendekatan nilai yang tidak efektif.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Bloom</b> — dikenal dengan Taksonomi Bloom (domain pembelajaran kognitif, afektif, psikomotorik), bukan konsep \"bandul pendidikan.\"<br>• <b>Lickona</b> — tokoh pendidikan karakter (<i>character education</i>); meski relevan dengan nilai, konsep \"bandul pendidikan\" dan <i>ethically illiterate</i> lebih spesifik ke Honing.<br>• <b>Jean Piaget</b> — dikenal dengan teori perkembangan kognitif dan moral anak; bukan dengan \"bandul pendidikan\" dalam konteks kebijakan pendidikan nilai."},
{id:137,q:"Menurut Piaget, tahapan pada domain kesadaran mengenai aturan pada usia 8-12 tahun akan berperilaku, yaitu....",opts:["Pada usia ini aturan dirasakan sebagai hal yang tidak bersifat memaksa","Pada usia ini aturan disikapi sebagai hal yang bersifat sakral dan diterima tanpa pemikiran","Pada usia ini aturan diterima sebagai hal kesepakatan","Pada usia ini aturan dilaksanakan sebagai hal yang hanya bersifat motorik saja"],ans:2, exp:"Menurut Piaget, dalam domain <b>kesadaran mengenai aturan</b> usia <b>8–12 tahun</b>, aturan dipandang sebagai <b>hal kesepakatan</b>—anak memahami bahwa aturan adalah produk persetujuan bersama yang bisa diubah jika ada kesepakatan kolektif baru.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Aturan dirasakan sebagai hal yang tidak berubah</b> — ciri fase usia 2–7 tahun (moralitas heteronom), bukan 8–12 tahun.<br>• <b>Aturan disikapi sebagai hal yang bersifat sakral</b> — \"sakral\" ciri moralitas heteronom (fase lebih muda); pada 8–12 tahun anak sudah memasuki fase otonom yang lebih fleksibel.<br>• <b>Aturan dilaksanakan sebagai hal yang sudah pasti</b> — lebih dekat dengan fase remaja/dewasa yang menerima aturan sebagai tatanan mapan."},
{id:138,q:"Kelompok penyaji saat penyajian dapat berdialog dengan....",opts:["Moderator","Pemimpin lomba","Pembawa acara","Juri"],ans:3, exp:"Saat penyajian portofolio (show case), kelompok penyaji dapat berdialog dengan <b>juri</b>—panel yang terdiri dari pejabat terkait, ahli, atau tokoh masyarakat yang kompeten dalam bidang kebijakan publik yang dikaji, memberikan tanggapan kritis dan penilaian konstruktif.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Moderator</b> — bertugas mengatur jalannya acara/diskusi; bukan mitra dialog yang menilai konten portofolio.<br>• <b>Pemimpin lomba</b> — bukan peran yang ada dalam konteks penyajian portofolio PKn; lebih ke konteks kompetisi.<br>• <b>Pembawa acara</b> — memandu jalannya acara secara seremonial; berbeda dari juri yang memberikan tanggapan substantif."},
{id:139,q:"Tujuan PKn di SD yang memiliki perilaku sosial-psikologis dan kultural-kosmopolitan adalah....",opts:["Berpikir secara kritis, rasional, dan kreatif dalam menanggapi isu kewarganegaraan","Berpartisipasi secara aktif dan bertanggung jawab, dan bertindak secara cerdas dalam kegiatan bermasyarakat, berbangsa, dan bernegara, serta anti korupsi","Berkembang secara positif dan demokratis untuk membentuk diri berdasarkan karakter-karakter masyarakat Indonesia agar dapat hidup bersama dengan bangsa lainnya","Berinteraksi dengan bangsa-bangsa lain dalam percaturan dunia secara langsung atau tidak langsung dengan memanfaatkan teknologi informasi dan komunikasi"],ans:2, exp:"Tujuan PKn di SD yang memiliki perilaku sosial-psikologis dan kultural-kosmopolitan adalah: <b>\"Berkembang secara positif dan demokratis untuk membentuk diri berdasarkan karakter-karakter masyarakat Indonesia agar dapat hidup bersama dengan bangsa lainnya.\"</b> Mencerminkan dimensi kosmopolitan sekaligus pembentukan karakter Indonesia.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Berpikir secara kritis, rasional, dan kreatif</b> — tujuan dimensi <i>kognitif</i> PKn, bukan sosial-psikologis dan kultural-kosmopolitan.<br>• <b>Berpartisipasi secara aktif dan bertanggung jawab</b> — tujuan dimensi <i>partisipasi/afektif-civic</i>, bukan kultural-kosmopolitan.<br>• <b>Berinteraksi dengan bangsa-bangsa lain</b> — hanya menyebut dimensi kosmopolitan tanpa dimensi sosial-psikologis dan pembentukan karakter Indonesia."},
{id:140,q:"Setiap manusia pasti mempunyai berbagai keinginan untuk diwujudkan dalam kehidupannya. Betapa pentingnya minat atau keinginan ini sebagai salah satu potensi dasar manusia. Hal tersebut merupakan potensi dasar mental, yaitu dorongan ingin....",opts:["Tahu (sense of curiosity)","Membuktikan kenyataan (sense of reality)","Menyelidiki (sense of inquiry)","Menemukan sendiri (sense of discovery)"],ans:3, exp:"Setiap manusia punya berbagai keinginan untuk diwujudkan dalam hidupnya—ini dorongan ingin <b>menemukan sendiri (sense of discovery)</b>. Berbeda dari curiosity (ingin tahu) dan inquiry (ingin menyelidiki), sense of discovery berfokus pada keinginan menemukan sesuatu yang baru secara mandiri.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Tahu (sense of curiosity)</b> — dorongan ingin tahu; ini awal proses, belum sampai pada \"menemukan sendiri.\"<br>• <b>Membuktikan kenyataan (sense of reality)</b> — dorongan mengkonfirmasi kebenaran yang sudah dipertanyakan; berbeda dari menemukan sesuatu yang belum diketahui.<br>• <b>Menyelidiki (sense of inquiry)</b> — dorongan menyelidiki secara metodis; sense of discovery lebih pada hasil penemuan, bukan proses penyelidikan."},
{id:141,q:"Seorang ahli yang mendefinisikan warga negara sebagai anggota sekelompok manusia yang hidup atau tinggal di wilayah hukum tertentu adalah....",opts:["Aristoteles","Plato","Turne","Ricey"],ans:2, exp:"<b>Turne</b> adalah ahli yang mendefinisikan warga negara sebagai \"anggota dari sekelompok manusia yang hidup atau tinggal di wilayah hukum tertentu\"—menekankan aspek territorial/domisili.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Aristoteles</b> — mendefinisikan warga negara dalam polis Yunani sebagai orang yang berpartisipasi aktif dalam pemerintahan; berbeda dari definisi berbasis wilayah hukum.<br>• <b>Plato</b> — dalam <i>The Republic</i>, mengklasifikasikan warga negara berdasarkan kemampuan dan perannya dalam negara ideal.<br>• <b>Ricey</b> — bukan tokoh yang dikenal dengan definisi kewarganegaraan yang relevan dalam konteks ini."},
{id:142,q:"Seorang guru PKn SD mengajar materi kasih sayang dengan cara memberi contoh figur seorang yang dipandang arif bijaksana, disiplin dan sebagainya. Strategi guru tersebut menggunakan pendekatan ....",opts:["Peranan moral","Perkembangan moral","Teladan","Transmisi nilai bebas terkesan"],ans:2, exp:"Guru yang mengajar kasih sayang dengan cara memberi contoh figur arif, bijaksana, dan disiplin menggunakan pendekatan <b>teladan</b>—guru sebagai model perilaku yang patut ditiru, nilai-nilai moral terinternalisasi melalui pengamatan dan pencontohan (<i>modeling</i>).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Peranan moral</b> — konsep tentang fungsi moral dalam kehidupan sosial, bukan strategi mengajar melalui contoh figur.<br>• <b>Perkembangan moral</b> — teori tentang bagaimana moral berkembang bertahap (Piaget, Kohlberg); bukan strategi keteladanan figur.<br>• <b>Transmisi nilai bebas terkesan</b> — penyampaian nilai secara bebas tanpa tekanan; berbeda dari teladan yang aktif menampilkan figur konkret sebagai contoh."},
{id:143,q:"Manusia sebagai homo religius bermakna bahwa....",opts:["Makhluk yang beragama, meyakini kekuasaan Tuhan","Makhluk yang mengejar keselamatan","Makhluk yang mengejar kehidupan yang damai dan sejahtera","Makhluk yang terikat dan percaya terhadap kekuatan-kekuatan gaib"],ans:0, exp:"<b>Homo religius</b> berarti manusia adalah <b>makhluk yang beragama, meyakini kekuasaan Tuhan</b>. Istilah ini (dari Mircea Eliade) menekankan bahwa dimensi spiritual/religius adalah hakikat dasar keberadaan manusia—terhubung dengan yang sacral (Tuhan/transendental).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Makhluk yang mengejar keselamatan</b> — menggambarkan motivasi bertahan hidup (survival), bukan esensi religiositas.<br>• <b>Makhluk yang mengejar kehidupan yang damai dan sejahtera</b> — menggambarkan motivasi hedonistik/utilitarian, bukan makna <i>homo religius</i>.<br>• <b>Makhluk yang terikat dan percaya terhadap kekuatan alam</b> — lebih menggambarkan animisme/fetisisme; <i>homo religius</i> mencakup kepercayaan pada Tuhan, lebih luas dari sekadar kekuatan alam."},
{id:144,q:"Melalui tujuan penilaian (evaluasi) dalam PPKn akan diperoleh data seorang siswa tentang....",opts:["Kemampuan dalam mata pelajaran tertentu","Kepribadian","Motivasi belajarnya","Kemajuan belajarnya"],ans:3, exp:"Melalui tujuan penilaian (evaluasi) dalam PPKn akan diperoleh data tentang <b>kemajuan belajar</b> siswa—seberapa jauh perkembangan dan peningkatan pemahaman, sikap, dan keterampilan siswa dari waktu ke waktu.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kemampuan dalam mata pelajaran tertentu</b> — berkaitan dengan hasil belajar sesaat, bukan tentang <i>kemajuan</i> (progress) yang bersifat dinamis dan longitudinal.<br>• <b>Kepribadian</b> — aspek yang lebih kompleks dan memerlukan instrumen psikologis khusus; bukan tujuan utama penilaian PPKn.<br>• <b>Motivasi belajarnya</b> — faktor internal yang mempengaruhi belajar; dapat diukur tetapi bukan tujuan utama evaluasi PPKn."},
{id:145,q:"Berikut ini merupakan persamaan antara PPKn dengan Pendidikan Kewarganegaraan dan Pendidikan Pancasila, yaitu sama-sama mengarahkan perhatian pada ....",opts:["Moral","Hak warganegara","Status warganegara","Kewajiban warganegara"],ans:0, exp:"Persamaan antara PPKn, Pendidikan Kewarganegaraan, dan Pendidikan Pancasila adalah sama-sama mengarahkan perhatian pada <b>moral</b>—nilai-nilai etis dan karakter yang harus dimiliki warga negara yang baik. Ini benang merah yang menghubungkan ketiganya.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Hak warganegara</b> — lebih spesifik menjadi fokus Pendidikan Kewarganegaraan, bukan persamaan yang mencakup semua tiga mata pelajaran.<br>• <b>Status warganegara</b> — topik hukum kewarganegaraan; bukan persamaan inti ketiganya.<br>• <b>Kewajiban warganegara</b> — meski ada dalam ketiga mata pelajaran, persamaan yang paling fundamental adalah orientasi moral."},
{id:146,q:"Kekuasaan atau wewenang untuk melaksanakan hak atau menggunakan hak merupakan aspek....",opts:["Kekuatan","Perlindungan hukum","Pembatasan hukum","Pembelaan hukum"],ans:1, exp:"Kekuasaan atau wewenang untuk melaksanakan dan menggunakan hak merupakan aspek <b>perlindungan hukum</b>—menjamin bahwa pemilik hak memiliki kekuatan legal untuk menggunakan haknya dan dilindungi dari gangguan pihak lain.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kekuatan</b> — \"kekuatan\" dalam arti umum tidak spesifik mengacu pada mekanisme hukum yang melindungi hak; perlindungan hukum lebih tepat karena mencakup aspek legal.<br>• <b>Pembatasan hukum</b> — aspek yang membatasi/mengatur pelaksanaan hak agar tidak merugikan orang lain; berbeda dari perlindungan yang memfasilitasi penggunaan hak.<br>• <b>Pembelaan hukum</b> — umumnya dalam konteks proses hukum/peradilan; berbeda dari perlindungan yang bersifat preventif dan berkelanjutan."},
{id:147,q:"PKn merupakan mata pelajaran dengan visi utama sebagai pendidikan demokrasi yang bersifat multidimensional. Alasannya antara lain sebagai berikut, kecuali....",opts:["Materi PKn adalah konsep-konsep nilai Pancasila dan UUD 45 beserta dinamika perwujudan dalam kehidupan masyarakat negara Indonesia","Sasaran belajar akhir PKn adalah perwujudan nilai-nilai tersebut dalam perilaku nyata kehidupan sehari-hari","Proses pembelajarannya menuntut terlibatnya emosional, intelektual, dan sosial dari peserta didik dan guru sehingga nilai-nilai itu bukan hanya dipahami tetapi dihayati dan dilaksanakan","Dengan belajar PKn diharapkan siswa mampu memiliki pengetahuan tentang hukum yang lebih kompleks"],ans:3, exp:"Yang <b>bukan</b> alasan PKn sebagai pendidikan demokrasi multidimensional: <b>\"agar siswa mampu memiliki pengetahuan hukum yang lebih kompleks.\"</b> PKn bukan pelajaran hukum, dan tujuan ini tidak mencerminkan dimensi jamak yang dimaksud multidimensional.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Materi PKn adalah konsep-konsep nilai Pancasila dan UUD 1945</b> — dimensi kognitif/konten yang komprehensif mencerminkan multidimensionalitas.<br>• <b>Sasaran belajar akhir PKn adalah perwujudan nilai-nilai dalam perilaku</b> — dimensi afektif-psikomotorik menjadikannya multidimensional.<br>• <b>Proses pembelajarannya menuntut terlibatnya emosional-intelektual-sosial</b> — keterlibatan tiga dimensi sekaligus adalah inti multidimensionalitas PKn."},
{id:148,q:"Substansi mata pelajaran IPA dan IPS pada SD/MI merupakan....",opts:["IPA Terpadu dan IPS Terpadu","IPA dan IPS Terpadu","IPA merupakan bagian dari IPS","IPS merupakan bagian dari IPA"],ans:0, exp:"Substansi mata pelajaran IPA dan IPS pada SD/MI merupakan <b>IPA Terpadu dan IPS Terpadu</b>. Sesuai kurikulum SD, IPA dan IPS tidak diajarkan sebagai disiplin terpisah melainkan secara terpadu dalam tema-tema pembelajaran yang kontekstual.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>IPA dan IPS Terpadu</b> — ambigu; \"IPA\" terkesan masih terpisah. Yang benar keduanya sama-sama terpadu: \"IPA Terpadu DAN IPS Terpadu.\"<br>• <b>IPA merupakan bagian dari IPS</b> — tidak benar; IPA dan IPS adalah disiplin yang berbeda; IPA bukan bagian dari IPS.<br>• <b>IPS merupakan bagian dari IPA</b> — juga tidak benar; keduanya merupakan disiplin yang berbeda namun sama-sama diajarkan secara terpadu di SD."},
{id:149,q:"Portofolio penilaian merupakan sebuah laporan tentang proses belajar siswa, sebuah kumpulan hasil kerja yang menunjukkan kepada siswa atau orang lain tentang hasil kerja siswa yang telah dicapai dalam satu atau lebih bidang, merupakan pandangan dari....",opts:["Nurani Rustaman","Azis Wahab","Nu'man Somantri","Kosasih Jahiri"],ans:1, exp:"<b>Portofolio penilaian</b> sebagai laporan tentang proses belajar siswa dan kumpulan hasil kerja yang menunjukkan hasil yang dicapai adalah definisi dari <b>Azis Wahab</b>—dokumentasi komprehensif perkembangan belajar siswa.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Nurani Rustaman</b> — ilmuwan pendidikan yang banyak berkontribusi di bidang pendidikan IPA dan biologi; bukan penggagas definisi portofolio penilaian yang dikutip.<br>• <b>Nu'man Somantri</b> — tokoh PKn Indonesia yang berkontribusi pada pengembangan PKn sebagai disiplin ilmu; bukan penggagas definisi portofolio ini.<br>• <b>Kosasih Jahiri</b> — tokoh PKn Indonesia lainnya yang berkontribusi pada pendidikan nilai; bukan penggagas definisi portofolio penilaian yang dimaksud."},
{id:150,q:"Ada 3 unsur yang harus dipenuhi untuk dapat dikatakan warga negara berpartisipasi dalam kegiatan berbangsa, bernegara, dan berpemerintahan yaitu, kecuali....",opts:["Ada rasa kesukarelaan (tanpa paksaan)","Ada keterlibatan secara emosional","Memperoleh manfaat secara langsung maupun tidak langsung dari keterlibatannya","Loyalitas terhadap partai"],ans:3, exp:"Tiga unsur yang harus dipenuhi agar warga negara dikatakan berpartisipasi: kesukarelaan (tanpa paksaan), keterlibatan emosional, dan memperoleh manfaat langsung/tidak langsung. <b>Loyalitas terhadap partai</b> bukan syarat—partisipasi tidak harus melalui afiliasi partai; warga non-partisan pun dapat berpartisipasi penuh.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Ada rasa kesukarelaan (tanpa paksaan)</b> — partisipasi yang dipaksakan bukan partisipasi sejati; kesukarelaan adalah syarat mutlak.<br>• <b>Ada keterlibatan secara emosional</b> — partisipasi yang tulus melibatkan kepedulian dan keterikatan emosional terhadap isu yang diperjuangkan.<br>• <b>Memperoleh manfaat secara langsung maupun tidak langsung</b> — warga berpartisipasi karena ada manfaat yang dirasakan, baik untuk diri sendiri maupun masyarakat luas."}
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

let qs=[],cur=0,ans={},phase="start",revIdx=0;

function render(){
  const root=document.getElementById("root");
  if(phase==="start"){
    root.innerHTML=`
    <div class="start-screen">
      <div class="start-card">
        <div class="start-icon"><i class="ti ti-books" aria-hidden="true"></i></div>
        <h1 class="start-title">SPGK4203</h1>
        <p class="start-sub">Pembelajaran PKn di Sekolah Dasar<br>Kuis latihan soal interaktif</p>
        <div class="pill"><i class="ti ti-list-numbers" aria-hidden="true"></i> 150 soal &nbsp;·&nbsp; <i class="ti ti-shuffle" aria-hidden="true"></i> diacak otomatis</div>
        <button class="btn-primary" onclick="startQuiz()"><i class="ti ti-player-play" aria-hidden="true"></i> &nbsp;Mulai Kuis</button>
      </div>
    </div>`;
  }
  else if(phase==="quiz"){
    const q=qs[cur];
    const userAns=ans[q.id];
    const hasAnswered=userAns!==undefined;
    const answered=Object.keys(ans).length;
