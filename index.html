    const total=qs.length;
    const pct=Math.round((answered/total)*100);
    const allDone=answered===total;
    const start=Math.max(0,Math.min(cur-3,total-7));
    let dots="";
    for(let i=start;i<Math.min(start+7,total);i++){
      const q2=qs[i];
      const a2=ans[q2.id];
      const isCur=i===cur;
      let dotCls = "mn-dot";
      
      if(a2 !== undefined) {
         if(a2 === q2.ans) dotCls += " correct-dot";
         else dotCls += " wrong-dot";
      }
      if(isCur) dotCls += " cur";

      dots+=`<button class="${dotCls}" onclick="jumpTo(${i})">${i+1}</button>`;
    }
    
    let opts="";
    q.opts.forEach((o,idx)=>{
      const isCorrectAns = idx === q.ans;
      const isUserPick = idx === userAns;
      
      let cls = "opt-btn";
      let onClickAttr = hasAnswered ? "" : `onclick="pick(${q.id},${idx})"`;
      let tag = "";
      
      if(hasAnswered) {
        if(isCorrectAns) {
          cls += " is-correct";
          tag = '<div class="rev-tag correct" style="margin-top:6px"><i class="ti ti-circle-check"></i> Jawaban Benar</div>';
        } else if(isUserPick) {
          cls += " is-wrong";
          tag = '<div class="rev-tag wrong" style="margin-top:6px"><i class="ti ti-circle-x"></i> Jawaban Kamu Salah</div>';
        } else {
          cls += " is-disabled";
        }
      }

      opts+=`<button class="${cls}" ${onClickAttr}>
        <span class="opt-label">${LABELS[idx]}</span>
        <div>
          <div class="opt-text">${o}</div>
          ${tag}
        </div>
      </button>`;
    });
    
    // Proses memunculkan kotak penjelasan jika sudah menjawab
    let expBox = "";
    if(hasAnswered) {
      // Jika 'exp' tersedia di soal, gunakan teks itu. Jika belum ada, beri tahu saja pilihan jawaban yang benar.
      const explanationText = q.exp ? q.exp : `Jawaban yang benar adalah <b>${LABELS[q.ans]}. ${q.opts[q.ans]}</b>`;
      expBox = `
        <div class="explanation-box">
          <div class="explanation-title"><i class="ti ti-bulb" aria-hidden="true"></i> Penjelasan</div>
          <p>${explanationText}</p>
        </div>
      `;
    }
    
    root.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-header">
        <div class="hdr-row">
          <div class="hdr-info">Soal <b>${cur+1}</b> / ${total} &nbsp;—&nbsp; Terjawab <b>${answered}</b></div>
          <button class="submit-btn ${allDone?"done":""}" onclick="submitQuiz()">${allDone?"Kumpulkan ✓":"Kumpulkan"}</button>
        </div>
        <div class="prog-bar"><div class="prog-fill ${allDone?"done":""}" style="width:${pct}%"></div></div>
      </div>
      <div class="quiz-body">
        <div class="q-card">
          <div class="q-num">Soal ${cur+1}</div>
          <p class="q-text">${q.q}</p>
        </div>
        <div class="opts">${opts}</div>
        ${expBox}
      </div>
      <div class="nav-bar">
        <div class="nav-inner">
          <button class="nav-btn" onclick="nav(-1)" ${cur===0?"disabled":""}>← Prev</button>
          <div class="mini-nav">${dots}</div>
          <button class="nav-btn" onclick="nav(1)" ${cur===total-1?"disabled":""}>Next →</button>
        </div>
      </div>
    </div>`;
  }
  else if(phase==="result"){
    let correct=0,wrong=0,skip=0;
    qs.forEach(q=>{const a=ans[q.id];if(a===undefined)skip++;else if(a===q.ans)correct++;else wrong++;});
    const score=Math.round((correct/qs.length)*100);
    const info=score>=90?{l:"Luar biasa! Sempurna!",c:"#51CF66"}:score>=80?{l:"Sangat baik!",c:"#4DABF7"}:score>=70?{l:"Cukup baik, terus belajar!",c:"#FCC419"}:score>=60?{l:"Perlu ditingkatkan",c:"#FF922B"}:{l:"Tetap semangat belajar!",c:"#FA5252"};
    root.innerHTML=`
    <div class="result-screen">
      <div class="result-card">
        <h2 style="font-size:20px;font-weight:600;color:var(--color-text-primary);margin-bottom:8px">Hasil Kuis</h2>
        <p class="grade-label" style="color:${info.c}">${info.l}</p>
        <div class="score-big" style="color:${info.c}">${score}</div>
        <div class="score-label">nilai dari 100</div>
        <div class="stats-grid">
          <div class="stat-box correct"><div class="stat-n">${correct}</div><div class="stat-l"><i class="ti ti-circle-check" aria-hidden="true"></i> Benar</div></div>
          <div class="stat-box wrong"><div class="stat-n">${wrong}</div><div class="stat-l"><i class="ti ti-circle-x" aria-hidden="true"></i> Salah</div></div>
          <div class="stat-box skip"><div class="stat-n">${skip}</div><div class="stat-l"><i class="ti ti-minus-circle" aria-hidden="true"></i> Kosong</div></div>
        </div>
        <button class="btn-primary" onclick="startQuiz()"><i class="ti ti-refresh" aria-hidden="true"></i> &nbsp;Ulangi Kuis (Acak Ulang)</button>
      </div>
    </div>`;
  }
}

function startQuiz(){qs=shuffle(Q);cur=0;ans={};phase="quiz";render(); window.scrollTo(0,0);}
function pick(id,val){
  if(ans[id] !== undefined) return;
  ans[id]=val;
  render();
}
function nav(d){cur=Math.max(0,Math.min(qs.length-1,cur+d));render(); window.scrollTo(0,0);}
function jumpTo(i){cur=i;render(); window.scrollTo(0,0);}
function submitQuiz(){
  const answered=Object.keys(ans).length;
  const remaining=qs.length-answered;
  if(remaining>0){if(!confirm(`Masih ada ${remaining} soal belum dijawab. Yakin kumpulkan sekarang?`))return;}
  phase="result";render(); window.scrollTo(0,0);
}

render();
</script>
</body>
</html>
