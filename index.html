<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kuis SPGK4203 - Mode Gelap & Evaluasi Langsung</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --color-background-tertiary: #121212; 
  --color-background-primary: #1E1E1E;  
  --color-background-secondary: #2C2C2C; 
  
  --color-border-primary: #4DABF7; 
  --color-border-secondary: #555555;
  --color-border-tertiary: #333333;
  
  --color-text-primary: #F8F9FA; 
  --color-text-secondary: #ADB5BD; 
  --color-text-tertiary: #868E96;  
  
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}

*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{font-family:var(--font-sans);background:var(--color-background-tertiary); color: var(--color-text-primary);}
.quiz-wrap{min-height:100vh;background:var(--color-background-tertiary); padding-bottom: 20px;}

/* Layar Mulai */
.start-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem}
.start-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-xl);padding:2.5rem 1.5rem;max-width:420px;width:100%;text-align:center;box-shadow: 0 4px 20px rgba(0,0,0,0.5)}
.start-icon{font-size:48px;margin-bottom:1rem;color: var(--color-text-secondary);}
.start-title{font-size:22px;font-weight:600;color:var(--color-text-primary);margin-bottom:8px}
.start-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.6}
.pill{display:inline-flex;align-items:center;flex-wrap:wrap;justify-content:center;gap:6px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--color-text-secondary);margin-bottom:1.5rem}

/* Tombol Global */
.btn-primary{display:flex;justify-content:center;align-items:center;width:100%;padding:14px;background:#4DABF7;color:#121212;border:none;border-radius:var(--border-radius-md);font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s; margin-bottom: 10px;}
.btn-primary:hover{opacity:0.85}
.btn-secondary{display:flex;justify-content:center;align-items:center;width:100%;padding:14px;background:var(--color-background-secondary);color:var(--color-text-primary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s;}
.btn-secondary:hover{background:var(--color-background-tertiary)}

/* Header Kuis */
.quiz-header{background:var(--color-background-primary);border-bottom:1px solid var(--color-border-tertiary);padding:14px 16px;position:sticky;top:0;z-index:10}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;max-width:680px;margin-left:auto;margin-right:auto;}
.hdr-info{font-size:13px;color:var(--color-text-secondary)}
.hdr-info b{color:var(--color-text-primary);font-weight:600}
.submit-btn{padding:8px 14px;background:var(--color-text-primary);color:var(--color-background-tertiary);border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.submit-btn:hover{background:var(--color-text-secondary)}
.submit-btn.done{background:#51CF66;color:#121212}
.prog-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;max-width:680px;margin:0 auto;}
.prog-fill{height:100%;border-radius:2px;transition:width 0.3s;background:#4DABF7}
.prog-fill.done{background:#51CF66}

/* Area Soal */
.quiz-body{padding:20px 16px 140px;max-width:680px;margin:0 auto}
.q-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px;margin-bottom:16px}
.q-num{font-size:12px;font-weight:600;color:#4DABF7;letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase}
.q-text{font-size:15px;color:var(--color-text-primary);line-height:1.7;font-weight:400}

/* Pilihan Jawaban */
.opts{display:flex;flex-direction:column;gap:10px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;text-align:left;transition:all 0.2s;width:100%}
.opt-btn:hover:not(.is-disabled):not(.is-correct):not(.is-wrong){border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.opt-label{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:13px;font-weight:600;flex-shrink:0;transition:all 0.2s}
.opt-text{font-size:14.5px;color:var(--color-text-primary);line-height:1.5;padding-top:3px}

/* Evaluasi Langsung */
.opt-btn.is-correct{border-color:#51CF66;background:rgba(81, 207, 102, 0.05);cursor:default}
.opt-btn.is-wrong{border-color:#FA5252;background:rgba(250, 82, 82, 0.05);cursor:default}
.opt-btn.is-disabled{opacity:0.4;cursor:default}
.opt-btn.is-correct .opt-label{background:#51CF66;color:#121212}
.opt-btn.is-wrong .opt-label{background:#FA5252;color:#121212}
.rev-tag{font-size:12px;font-weight:600;margin-top:6px;display:flex;align-items:center;gap:4px}
.rev-tag.correct{color:#51CF66}
.rev-tag.wrong{color:#FA5252}

/* Kotak Penjelasan */
.explanation-box{margin-top:16px;padding:16px 18px;border-radius:var(--border-radius-md);background:rgba(77, 171, 247, 0.08);border:1px solid var(--color-border-primary);animation:fadeIn 0.3s ease}
.explanation-title{font-size:14px;font-weight:600;color:#4DABF7;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.explanation-box p{font-size:14px;color:var(--color-text-primary);line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* Navigasi Bawah */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--color-background-primary);border-top:1px solid var(--color-border-tertiary);padding:12px 16px;z-index:10}
.nav-inner{max-width:680px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px}
.nav-btn{padding:10px 16px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:14px;font-weight:500;cursor:pointer;transition:background 0.12s}
.nav-btn:hover{background:var(--color-border-tertiary)}
.nav-btn:disabled{opacity:0.4;cursor:default}

/* Mini Navigasi (Nomor Soal) */
.mini-nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;overflow-x:auto;padding-bottom:4px}
.mn-dot{width:28px;height:28px;border-radius:6px;border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.mn-dot.correct-dot { background: rgba(81, 207, 102, 0.15); border-color: #51CF66; color: #51CF66; }
.mn-dot.wrong-dot { background: rgba(250, 82, 82, 0.15); border-color: #FA5252; color: #FA5252; }
.mn-dot.cur:not(.correct-dot):not(.wrong-dot) {background:#4DABF7;border-color:#4DABF7;color:#121212}
.mn-dot.cur.correct-dot, .mn-dot.cur.wrong-dot { border-width: 2px; }

/* Hasil Kuis */
.result-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem}
.result-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-xl);padding:2.5rem 1.5rem;max-width:420px;width:100%;text-align:center}
.score-big{font-size:80px;font-weight:600;line-height:1;margin-bottom:8px}
.score-label{font-size:14px;color:var(--color-text-tertiary);margin-bottom:1.5rem}
.grade-label{font-size:16px;font-weight:600;margin-bottom:2rem}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:2rem}
.stat-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:16px 10px; border:1px solid var(--color-border-tertiary)}
.stat-n{font-size:24px;font-weight:600}
.stat-l{font-size:12px;color:var(--color-text-secondary);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:4px}
.stat-box.correct .stat-n{color:#51CF66}
.stat-box.wrong .stat-n{color:#FA5252}
.stat-box.skip .stat-n{color:var(--color-text-tertiary)}

/* Responsif untuk Layar HP yang sangat kecil */
@media(max-width:480px){
  .mn-dot{width:24px;height:24px;font-size:10px}
  .nav-btn{padding:8px 12px;font-size:13px}
  .opt-btn{padding:12px}
  .q-text{font-size: 14px;}
}
</style>
</head>
<body>

<div id="root"></div>

<script>
const LABELS=["A","B","C","D"];
const Q=[
// Lihat pada soal ID 1, 2, dan 3. Saya menambahkan format: exp: "Teks penjelasan disini".
{id:1,q:"Alat penilaian pengamatan yang dapat digunakan untuk menilai hasil belajar afektif dan psikomotorik dari siswa, diantaranya adalah ....",opts:["Kuesioner","Inventories","Wawancara","Daftar cocok"],ans:3, exp:"<b>Daftar cocok (checklist)</b> adalah jawaban yang benar karena alat ini dirancang khusus untuk menilai hasil belajar <b>afektif (sikap) dan psikomotorik (keterampilan)</b> melalui pengamatan langsung. Guru hanya perlu mencentang ada/tidaknya suatu perilaku yang diamati.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kuesioner</b> — digunakan untuk mengumpulkan pendapat/perasaan siswa secara tertulis, bukan alat pengamatan langsung.<br>• <b>Inventories</b> — digunakan untuk menginventarisasi minat, sikap, atau kepribadian berbentuk angket, bukan observasi langsung.<br>• <b>Wawancara</b> — bersifat verbal/lisan untuk menggali informasi mendalam, bukan pengamatan perilaku secara langsung."},
{id:2,q:"Berikut ini adalah langkah-langkah dasar dalam menyusun classroom test seperti yang dikemukakan oleh Gronlund, kecuali ....",opts:["Building a table of specification","Selecting appropriate item test","Assembling the test","Evaluating the test"],ans:3, exp:"Menurut Gronlund, urutan langkah penyusunan tes kelas: (1) Determining the purpose of testing, (2) Building a table of specification, (3) Selecting appropriate item test, (4) Assembling the test, (5) <b>Evaluating the test</b>. Langkah ke-5 adalah mengevaluasi kualitas tes setelah dibuat dan digunakan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Building a table of specification</b> — ini langkah ke-<b>2</b>, bukan ke-5.<br>• <b>Selecting appropriate item test</b> — ini langkah ke-<b>3</b>.<br>• <b>Assembling the test</b> — ini langkah ke-<b>4</b> (merakit butir soal menjadi satu tes yang utuh)."},
{id:3,q:"Yang merupakan salah satu ciri pembelajaran terpadu pada mata pelajaran PKn adalah ....",opts:["Berpusat pada guru","Memberi pengalaman langsung kepada anak","Bersifat kaku","Hasil pembelajaran tidak dapat berkembang sesuai dengan kebutuhan"],ans:1, exp:"Ciri pembelajaran terpadu yang membedakannya dari konvensional adalah pendekatannya yang <b>berpusat pada siswa (student centered)</b> dan <b>memberi pengalaman langsung</b>. Siswa tidak hanya menerima informasi, tetapi terlibat aktif dalam pengalaman nyata yang bermakna.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Berpusat pada guru</b> — ini ciri pembelajaran konvensional/tradisional, bukan pembelajaran terpadu.<br>• <b>Bersifat kaku</b> — pembelajaran terpadu justru bersifat fleksibel dan kontekstual.<br>• <b>Hasil pembelajaran tidak dapat berkembang</b> — pembelajaran terpadu justru mendorong perkembangan pemahaman secara holistik dan berkelanjutan."},
{id:4,q:"Anak yang dalam melakukan tindakan moralnya didasarkan pada perasaan ingin disebut sebagai anak baik atau anak manis bila dikaitkan dengan tahap perkembangan moral menurut L. Kohlberg maka anak tersebut berada pada tahap....",opts:["Preconventional","Conventional","Posconventional","Sensorimotorik"],ans:1, exp:"Anak yang bertindak agar disebut \"anak baik\" berarti motivasinya adalah mendapat <b>pengakuan dari orang lain</b>. Menurut Kohlberg, ini ciri khas <b>Tingkat II: Conventional</b>, Tahap 3 (Orientasi Kesepakatan Timbal Balik), di mana sesuatu dipandang baik karena memenuhi harapan orang di sekitarnya.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Preconventional</b> — anak bertindak untuk menghindari hukuman (Tahap 1) atau mendapat hadiah untuk dirinya sendiri (Tahap 2), bukan untuk pengakuan sosial.<br>• <b>Posconventional</b> — moralitas didasarkan pada prinsip universal dan kontrak sosial, jauh lebih abstrak dari sekadar ingin dianggap baik.<br>• <b>Sensorimotorik</b> — istilah dari teori perkembangan kognitif Piaget yang merujuk pada tahap bayi usia 0–2 tahun; tidak ada hubungannya dengan tingkatan moral Kohlberg."},
{id:5,q:"Menurut pandangan dari Prof. Hayati Soedibyo, untuk menanggulangi keanekaragaman perlu diperhatikan hal-hal sebagai berikut, kecuali....",opts:["Bahwa Indonesia merupakan kepulauan yang luas sekali","Wilayah yang luas itu terdiri dari ribuan pulau dengan jumlah penduduk yang beraneka ragam","Keanekaragaman budaya dan bahasa setempat memiliki dasar budaya dan bahasa yang sama","Hukum nasional harus diberlakukan secara berbeda-beda menyesuaikan kondisi budayanya"],ans:3, exp:"Menurut Prof. Hayati Soedibyo, untuk menanggulangi keanekaragaman Indonesia perlu memperhatikan luasnya wilayah kepulauan, ribuan pulau yang ada, serta adanya kesamaan dasar budaya dan bahasa. <b>\"Hukum nasional harus diberlakukan secara berbeda-beda menyesuaikan kondisi budaya\"</b> justru bertentangan dengan prinsip negara kesatuan yang menerapkan hukum nasional secara seragam dan adil.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>A (Indonesia merupakan kepulauan yang luas)</b> — faktor nyata keanekaragaman, diakui Hayati.<br>• <b>B (Wilayah luas terdiri dari ribuan pulau)</b> — kondisi geografis yang mempengaruhi keanekaragaman.<br>• <b>C (Kesamaan budaya dan bahasa setempat)</b> — modal persatuan meski ada keanekaragaman."},
{id:6,q:"Pasal 1 ayat 1 UUD 1945 membahas tentang....",opts:["Negara Indonesia ialah negara kesatuan yang berbentuk republik","Negara menghormati dan memelihara bahasa daerah sebagai kekayaan budaya nasional","Bendera negara Indonesia ialah Sang Merah Putih","Bahasa Negara ialah Bahasa Indonesia"],ans:0, exp:"Pasal 1 ayat (1) UUD 1945 menyatakan: <b>\"Negara Indonesia ialah negara kesatuan yang berbentuk republik.\"</b> Ini adalah dasar konstitusional bentuk negara dan pemerintahan Indonesia.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Negara menghormati dan memelihara bahasa daerah</b> — bunyi Pasal <b>32 ayat (2)</b> UUD 1945.<br>• <b>Bendera negara Indonesia ialah Sang Merah Putih</b> — bunyi Pasal <b>35</b> UUD 1945.<br>• <b>Bahasa Negara ialah Bahasa Indonesia</b> — bunyi Pasal <b>36</b> UUD 1945."},
{id:7,q:"Pengadilan yang bertugas dan berwenang memeriksa perkara di tingkat pertama antara orang-orang yang beragama Islam di bidang perkawinan, waris, wasiat, hibah, wakaf dan shodaqoh berdasarkan hukum Islam, adalah....",opts:["Peradilan agama","Peradilan militer","Peradilan tata usaha negara","Peradilan negeri"],ans:0, exp:"Berdasarkan UU No. 7 Tahun 1989, <b>Peradilan Agama</b> berwenang memeriksa perkara di tingkat pertama antara orang-orang beragama Islam di bidang perkawinan, kewarisan, wasiat, hibah, wakaf, dan shadaqah berdasarkan hukum Islam.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Peradilan Militer</b> — mengadili perkara pidana yang dilakukan oleh anggota TNI, bukan perkara agama.<br>• <b>Peradilan Tata Usaha Negara</b> — mengadili sengketa antara warga negara dengan badan/pejabat pemerintah (sengketa administrasi).<br>• <b>Peradilan Negeri</b> — mengadili perkara perdata dan pidana umum untuk semua golongan, bukan khusus urusan agama Islam."},
{id:8,q:"Tari Maengket berasal dari daerah....",opts:["Sulawesi Selatan","Sulawesi Utara","Sumatra Barat","Maluku"],ans:1, exp:"<b>Tari Maengket</b> adalah tarian tradisional dari <b>Sulawesi Utara</b>, tepatnya suku Minahasa. Tarian ini biasanya dibawakan secara massal sebagai ekspresi syukur atas hasil panen atau dalam upacara adat.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Sulawesi Selatan</b> — memiliki tarian khasnya sendiri seperti Tari Pakarena dari suku Makassar/Bugis.<br>• <b>Sumatra Barat</b> — memiliki tarian khas seperti Tari Piring dan Tari Randai dari suku Minangkabau.<br>• <b>Maluku</b> — memiliki tarian khas seperti Tari Cakalele dan Tari Saureka-reka."},
{id:9,q:"Latar belakang kemajemukan bangsa Indonesia ditinjau dari aspek sosiologis dan kultural, adalah....",opts:["Dampak teknologi manusia yang berkembang selama berabad-abad menghasilkan peradaban yang berbeda","Kondisi kepulauan di Indonesia yang berbeda-beda seperti perbedaan iklim dan curah hujan","Nenek moyang bangsa Indonesia berdatangan ke pulau yang ada di Indonesia dalam waktu yang cukup lama dan berbeda-beda, dalam perjalanannya mereka berupaya mempertahankan diri dan menyesuaikan dengan kondisi yang ada","Munculnya sistem pemerintahan kerajaan di setiap daerah"],ans:2, exp:"Latar belakang kemajemukan dari aspek sosiologi dan kultural berkaitan dengan proses adaptasi dan perkembangan budaya. <b>Nenek moyang berdatangan ke berbagai pulau dalam waktu berbeda-beda</b>, berupaya mempertahankan diri dan menyesuaikan diri dengan lingkungannya, sehingga berkembang budaya yang beragam sesuai kondisi lokal.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Dampak teknologi manusia</b> — ini latar belakang dari aspek <b>geografis</b>, bukan sosiologi dan kultural.<br>• <b>Kondisi kepulauan yang berbeda-beda</b> — ini aspek <b>geografis</b> yang mempengaruhi keanekaragaman.<br>• <b>Munculnya sistem pemerintahan kerajaan</b> — ini aspek <b>historis dan politis</b>, bukan sosiologi dan kultural."},
{id:10,q:"Pejabat yang diberi wewenang untuk bertindak sebagai penuntut umum serta melaksanakan keputusan pengadilan yang telah memperoleh kekuatan hukum tetap, yaitu....",opts:["Kepolisian","Kejaksaan","Kehakiman","Penasihat hukum"],ans:1, exp:"Berdasarkan UU No. 16 Tahun 2004 tentang Kejaksaan RI, <b>Kejaksaan</b> adalah lembaga yang berwenang sebagai <b>penuntut umum</b> sekaligus melaksanakan putusan pengadilan yang telah berkekuatan hukum tetap (eksekutor).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kepolisian</b> — bertugas di bidang penyelidikan dan penyidikan tindak pidana, bukan penuntutan.<br>• <b>Kehakiman</b> — bertugas mengadili (memeriksa dan memutus perkara), bukan menuntut.<br>• <b>Penasihat hukum</b> — bertugas membela dan mendampingi klien, bukan menuntut atas nama negara."},
{id:11,q:"PKn merupakan pendidikan yang memungkinkan siswa mengetahui apa yang menjadi hak dan kewajibannya, adalah peran PKn sebagai pendidikan....",opts:["Kewarganegaraan","Hukum dan masyarakat","Politik","Nilai dan moral Pancasila"],ans:0, exp:"PKn sebagai pendidikan <b>kewarganegaraan</b> berfokus pada pemahaman hak dan kewajiban warga negara dalam kehidupan bermasyarakat, berbangsa, dan bernegara—inilah inti PKn: membentuk warga negara yang sadar dan mampu menjalankan perannya.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Hukum dan masyarakat</b> — ini lebih merupakan bidang kajian sosiologi hukum, bukan inti PKn di SD.<br>• <b>Politik</b> — PKn berkaitan dengan politik, tetapi fokus utamanya bukan ilmu politik melainkan kewarganegaraan praktis.<br>• <b>Nilai dan moral Pancasila</b> — ini lebih merupakan fokus PPKn (Pancasila + Kewarganegaraan), yang merupakan kombinasi dari keduanya."},
{id:12,q:"Di bawah ini merupakan model pembelajaran terpadu yang sering digunakan di SD, kecuali....",opts:["Fragmented","Webbed","Connected","Integrated"],ans:0, exp:"Model pembelajaran terpadu yang <b>sering digunakan</b> di SD adalah webbed, connected, dan integrated. <b>Fragmented</b> (terpisah-pisah) justru berlawanan dengan konsep pembelajaran terpadu—di SD digunakan pendekatan yang tidak fragmented.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Webbed</b> — model jaring laba-laba yang mengintegrasikan berbagai mata pelajaran melalui satu tema. Sering digunakan di SD.<br>• <b>Connected</b> — model yang menghubungkan topik-topik dalam satu mata pelajaran. Digunakan di SD.<br>• <b>Integrated</b> — model yang memadukan berbagai disiplin ilmu yang saling tumpang tindih konsepnya. Digunakan di SD."},
{id:13,q:"Kumpulan informasi yang tersusun dengan baik yang menggambarkan rencana kelas berkenaan dengan suatu isu kebijakan publik yang telah diputuskan untuk dikaji, dinamakan....",opts:["Kliping","Portofolio","Album","Laporan karya ilmiah"],ans:1, exp:"<b>Portofolio</b> adalah kumpulan informasi yang tersusun baik, menggambarkan rencana kelas berkenaan dengan isu kebijakan publik yang dikaji. Portofolio kelas adalah dokumen sistematis, bukan sekadar kumpulan biasa.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kliping</b> — hanya kumpulan guntingan artikel tanpa struktur rencana kebijakan.<br>• <b>Album</b> — kumpulan foto atau kenangan, tidak berkaitan dengan rencana kebijakan publik.<br>• <b>Laporan karya ilmiah</b> — tulisan penelitian formal dengan metodologi khusus, berbeda dengan portofolio kelas PKn."},
{id:14,q:"Mata pelajaran PPKn menurut versi kurikulum Tahun 1994 adalah gabungan antara bahan kajian ....",opts:["Pendidikan Pancasila dan Bahasa Indonesia","Pendidikan Pancasila dan Pendidikan Agama","Pendidikan Pancasila dan Pendidikan Kewarganegaraan","Bahasa Indonesia dan Pendidikan Kewarganegaraan"],ans:2, exp:"Menurut Kurikulum 1994, PPKn adalah penggabungan <b>Pendidikan Pancasila</b> dengan <b>Pendidikan Kewarganegaraan</b>—mencerminkan bahwa nilai-nilai Pancasila dan hak-kewajiban kewarganegaraan merupakan satu kesatuan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pendidikan Pancasila dan Bahasa Indonesia</b> — Bahasa Indonesia bukan bagian dari PPKn.<br>• <b>Pendidikan Pancasila dan Pendidikan Agama</b> — Pendidikan Agama adalah mata pelajaran tersendiri, tidak masuk PPKn.<br>• <b>Bahasa Indonesia dan Pendidikan Kewarganegaraan</b> — Bahasa Indonesia tidak termasuk dalam PPKn."},
{id:15,q:"Penduduk Indonesia dari golongan Weddoid terdapat di daerah, kecuali....",opts:["Sakai","Mentawai","Enggano dan Tomuna","Aru"],ans:3, exp:"Golongan Weddoid mencakup orang Sakai (Riau), Mentawai (Sumbar), Enggano, dan Tomuna. <b>Aru</b> adalah wilayah yang penghuninya termasuk golongan <b>Papua Melanesoid</b>, bukan Weddoid.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Sakai</b> — suku di pedalaman Riau, termasuk golongan Weddoid (perawakan kecil, kulit sawo matang, rambut berombak).<br>• <b>Mentawai</b> — suku di kepulauan Mentawai, Sumatra Barat, termasuk golongan Weddoid.<br>• <b>Enggano dan Tomuna</b> — dua pulau di Sumatra yang penghuninya termasuk golongan Weddoid."},
{id:16,q:"Yang menjadi tantangan dalam mengimplementasikan konsep pembelajaran terpadu di SD ....",opts:["Kurikulum yang fleksibel","Jam pelajaran yang terbatas","Buku pelajaran yang tidak memadai","Kemampuan profesional guru"],ans:3, exp:"Tantangan terbesar implementasi pembelajaran terpadu di SD adalah <b>kemampuan profesional guru</b>. Guru dituntut memahami berbagai mata pelajaran sekaligus, membuat jaring tema, dan mengelola pembelajaran lintas disiplin—kompetensi yang memerlukan pelatihan khusus.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kurikulum yang fleksibel</b> — kurikulum fleksibel justru <i>mendukung</i> pembelajaran terpadu, bukan tantangan.<br>• <b>Jam pelajaran yang terbatas</b> — pembelajaran terpadu justru lebih efisien karena beberapa KD bisa dicapai sekaligus.<br>• <b>Buku pelajaran yang tidak memadai</b> — hambatan teknis yang bisa diatasi dengan kreativitas guru, bukan tantangan utama."},
{id:17,q:"Pasal UUD 1945 mengandung pernyataan tentang HAM, kecuali....",opts:["Segala warga negara bersamaan kedudukannya di dalam hukum dan pemerintahan","Tiap-tiap warga negara berhak atas pekerjaan dan penghidupan yang layak","Setiap warga negara berhak dan wajib ikut serta dalam upaya pembelaan negara","Setiap warga negara berhak atas pembuatan undang-undang atau peraturan yang akan diberlakukan"],ans:3, exp:"Pasal UUD 1945 yang memuat HAM antara lain Pasal 27 ayat (1), (2), dan (3). Yang <b>bukan</b> pernyataan HAM dalam UUD 1945 adalah: <b>\"Setiap warga negara berhak atas pembuatan undang-undang\"</b>—pembuatan UU adalah kewenangan lembaga legislatif (DPR), bukan hak perseorangan warga negara.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Segala warga negara bersamaan kedudukannya di dalam hukum</b> — bunyi Pasal 27 ayat (1), merupakan pernyataan HAM.<br>• <b>Tiap-tiap warga negara berhak atas pekerjaan dan penghidupan yang layak</b> — bunyi Pasal 27 ayat (2) UUD 1945.<br>• <b>Setiap warga negara berhak dan wajib ikut serta dalam upaya pembelaan negara</b> — bunyi Pasal 27 ayat (3) UUD 1945."},
{id:18,q:"Pembelajaran tematik merupakan aplikasi pendekatan pembelajaran....",opts:["Integrated","Connected","Contextual","Fragmented"],ans:0, exp:"Pembelajaran tematik adalah aplikasi dari pendekatan <b>integrated</b> (terpadu), di mana berbagai disiplin dilebur ke dalam satu tema yang bermakna—melampaui webbed yang masih mempertahankan batas antar mata pelajaran.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Connected</b> — menghubungkan topik-topik dalam <i>satu</i> mata pelajaran saja, belum lintas disiplin.<br>• <b>Contextual</b> — pendekatan yang menghubungkan materi dengan konteks nyata; bukan istilah khusus untuk pembelajaran tematik.<br>• <b>Fragmented</b> — pendekatan terpisah-pisah, berlawanan total dengan pembelajaran tematik."},
{id:19,q:"Upaya-upaya yang dilakukan dalam mewujudkan konsep ketahanan nasional, kecuali....",opts:["Tetap memungkinkan berjalannya pembangunan nasional yang selalu menuju ke tujuan yang ingin dicapai","Mempertahankan kemampuan dan ketangguhan suatu bangsa","Mempertahankan HANKAMNAS sebagai upaya rakyat semesta","Tetap mewujudkan kepulauan nusantara sebagai satu kesatuan pertahanan dan keamanan"],ans:2, exp:"Upaya mewujudkan ketahanan nasional meliputi: memungkinkan berjalannya pembangunan nasional, mempertahankan kemampuan bangsa, dan mewujudkan kepulauan nusantara sebagai satu kesatuan pertahanan. <b>\"Mempertahankan HANKAMNAS sebagai upaya rakyat semesta\"</b> bukan upaya <i>mewujudkan</i>—HANKAMNAS adalah <i>fungsi</i> yang sudah ada, bukan sesuatu yang perlu diwujudkan.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Tetap memungkinkan berjalannya pembangunan nasional</b> — salah satu tujuan ketahanan nasional.<br>• <b>Mempertahankan kemampuan dan ketangguhan suatu bangsa</b> — inti dari ketahanan nasional.<br>• <b>Mewujudkan kepulauan nusantara sebagai satu kesatuan pertahanan</b> — wujud nyata ketahanan nasional berakar pada Wawasan Nusantara."},
{id:20,q:"Meskipun kita menganut paham kekeluargaan, namun hak-hak warga negara tetap perlu dicantumkan dalam UUD 1945 agar tidak melahirkan suatu negara kekuasaan, pendapat ini dikemukakan oleh....",opts:["Ir. Soekarno","Drs. Moh. Hatta","Prof. Soepomo","Ir. Muh Yamin"],ans:1, exp:"<b>Drs. Moh. Hatta</b> khawatir tanpa jaminan hak warga negara dalam UUD, presiden bisa menyalahgunakan kekuasaan menjadi <i>negara kekuasaan</i>. Meskipun Indonesia menganut paham kekeluargaan, Hatta berpendapat hak-hak warga negara tetap harus dicantumkan dalam UUD 1945.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Ir. Soekarno</b> — lebih berfokus pada dasar negara (Pancasila), tidak mengemukakan pendapat ini secara spesifik.<br>• <b>Prof. Soepomo</b> — justru berpandangan sebaliknya: karena Indonesia menganut paham integralistik, tidak perlu mencantumkan hak-hak individu dalam UUD.<br>• <b>Ir. Muh. Yamin</b> — berpendapat HAM perlu ada sebagai keharusan melindungi warga, namun pendapat spesifik tentang \"negara kekuasaan\" ini adalah dari Hatta."},
{id:21,q:"Pendekatan yang bertujuan menggugah perasaan dan emosi siswa dalam memahami, menghayati dan meyakini nilai, sedangkan pendekatan rasional bertujuan ....",opts:["Memberikan peranan kepada akal dalam memahami dan menerima kebenaran nilai tersebut","Membekali siswa dengan pengetahuan dan keterampilan","Mengembangkan sikap hormati-menghormati","Mengakui persamaan hak dan derajat"],ans:0, exp:"Soal menanyakan tujuan pendekatan <b>rasional</b>. Jawabannya: <b>\"memberikan peranan kepada akal dalam memahami dan menerima kebenaran nilai.\"</b> Pendekatan rasional mengajak siswa berpikir logis dan kritis tentang mengapa suatu nilai itu benar.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Membekali siswa dengan pengetahuan dan keterampilan</b> — ini tujuan pendekatan <i>kognitif/didaktik</i>, bukan pendekatan rasional dalam pendidikan nilai.<br>• <b>Mengembangkan sikap hormati-menghormati</b> — ini tujuan pendekatan afektif/sosial.<br>• <b>Mengakui persamaan hak dan derajat</b> — ini merupakan nilai itu sendiri (konten), bukan metode/pendekatan mengajarkannya."},
{id:22,q:"Keanekaragaman budaya merupakan kekayaan bangsa yang harus dipelihara, merupakan nilai cinta tanah air ditinjau dari aspek tingkah laku yaitu aspek....",opts:["Sosial","Budaya dan adat istiadat","Hankamnas","Politik"],ans:1, exp:"Keanekaragaman budaya sebagai kekayaan bangsa yang harus dipelihara adalah wujud cinta tanah air dari aspek <b>budaya dan adat istiadat</b>—yaitu kecintaan pada warisan budaya, tradisi, seni, dan kearifan lokal sebagai identitas bangsa.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Sosial</b> — aspek sosial berkaitan dengan hubungan antar manusia dan struktur masyarakat, tidak spesifik pada keanekaragaman budaya.<br>• <b>Hankamnas</b> — aspek pertahanan dan keamanan nasional, tidak berkaitan langsung dengan pemeliharaan keanekaragaman budaya.<br>• <b>Politik</b> — aspek politik berkaitan dengan sistem pemerintahan dan kekuasaan, bukan pelestarian budaya."},
{id:23,q:"Apabila negara dalam ancaman bahaya, kesadaran warga negara terhadap negara adalah....",opts:["Lebih baik menyerah sebelum jatuh korban yang banyak","Meminta PBB mengadakan perundingan","Rela berkorban membela negara sampai titik darah penghabisan","Mencari perlindungan kepada negara-negara besar"],ans:2, exp:"Berdasarkan Pasal 27 ayat (3) dan Pasal 30 UUD 1945, bela negara adalah hak dan kewajiban setiap warga negara. Sikap yang mencerminkan kesadaran berbangsa saat negara terancam adalah <b>rela berkorban membela negara sampai titik darah penghabisan</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Lebih baik menyerah sebelum jatuh korban yang banyak</b> — bertentangan dengan semangat bela negara dan kedaulatan nasional.<br>• <b>Meminta PBB mengadakan perundingan</b> — langkah diplomatik, bukan sikap utama warga negara biasa dalam menghadapi ancaman langsung.<br>• <b>Mencari perlindungan kepada negara-negara besar</b> — mencerminkan ketergantungan, tidak sesuai dengan prinsip bebas aktif dan kedaulatan nasional."},
{id:24,q:"Rutin mendonorkan darah, perbuatan tersebut sesuai dengan sila kemanusiaan yang adil dan beradab terutama pada butir ....",opts:["Gemar melakukan kegiatan kemanusiaan","Menjunjung tinggi nilai-nilai kemanusiaan","Saling mencintai sesama manusia","Tenggang rasa dan tepa seliro"],ans:0, exp:"Mendonorkan darah secara rutin adalah tindakan membantu sesama tanpa pamrih. Ini sesuai butir <b>\"gemar melakukan kegiatan kemanusiaan\"</b> pada sila ke-2 Pancasila (Kemanusiaan yang Adil dan Beradab)—senang berbuat sesuatu yang bermanfaat bagi orang lain secara konkret.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Menjunjung tinggi nilai-nilai kemanusiaan</b> — bersifat prinsip abstrak, belum spesifik pada aksi konkret seperti donor darah.<br>• <b>Saling mencintai sesama manusia</b> — nilai yang lebih luas dan umum, belum spesifik mengarah pada kegiatan kemanusiaan aktif.<br>• <b>Tenggang rasa dan tepa seliro</b> — berkaitan dengan kepekaan dan empati, lebih pada aspek menghindari menyakiti orang lain."},
{id:25,q:"Pandangan Torres bahwa demokrasi merupakan suatu landasan pelaksanaan kekuasaan tertinggi di tangan rakyat disebut....",opts:["Aristotelian theory","Medieval theory","Contemporary doctrine of democracy","Actually doctrine of democracy"],ans:2, exp:"Torres menyebut pandangan bahwa <b>demokrasi merupakan landasan pelaksanaan kekuasaan tertinggi di tangan rakyat</b> sebagai <b>Contemporary Doctrine of Democracy</b>—doktrin modern tentang demokrasi yang menempatkan kedaulatan di tangan rakyat.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Aristotelian theory</b> — teori Aristoteles tentang bentuk pemerintahan Yunani kuno (monarki, aristokrasi, polity), bukan doktrin modern tentang kedaulatan rakyat.<br>• <b>Medieval theory</b> — teori abad pertengahan yang mengaitkan kekuasaan dengan otoritas gereja atau raja dengan mandat ilahi.<br>• <b>Actually doctrine of democracy</b> — istilah ini tidak dikenal dalam teori Torres tentang demokrasi."},
{id:26,q:"Untuk melaksanakan fungsi Komnas HAM dalam mediasi, menurut Pasal 89 Komnas HAM bertugas dan berwenang melakukan....",opts:["Pengamatan pelaksanaan HAM dan penyusunan laporan hasil pengamatan tersebut","Penyelesaian perkara melalui cara konsultasi, negosiasi, mediasi, konsolidasi, dan penilaian ahli","Pemberian saran kepada para pihak untuk menyelesaikan sengketa melalui pengadilan","Penyampaian rekomendasi atas suatu kasus pelanggaran HAM kepada Pemerintah"],ans:1, exp:"Menurut Pasal 89 UU No. 39/1999, dalam fungsi <b>mediasi</b> Komnas HAM berwenang melakukan <b>penyelesaian perkara melalui cara konsultasi, negosiasi, mediasi, konsolidasi, dan penilaian ahli</b>—upaya damai tanpa melalui pengadilan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pengamatan pelaksanaan HAM dan penyusunan laporan</b> — ini bagian dari fungsi <i>pemantauan</i>, bukan mediasi.<br>• <b>Pemberian saran kepada para pihak untuk menyelesaikan sengketa</b> — ini hanya sebagian kecil dari mediasi; pernyataan yang benar mencakup seluruh mekanisme penyelesaian sengketa.<br>• <b>Penyampaian rekomendasi atas suatu kasus pelanggaran HAM</b> — ini bagian dari fungsi <i>pengkajian dan penelitian</i> atau pemantauan."},
{id:27,q:"Ernest Renant berpendapat bahwa bangsa terbentuk karena....",opts:["Keinginan untuk menonjol di antara bangsa-bangsa lain","Sekelompok manusia yang mempunyai persamaan karakter","Adanya keinginan untuk hidup bersama dengan perasaan setia kawan","Adanya hasrat bersatu untuk kesatuan antara manusia dan tempat tinggal"],ans:2, exp:"Ernest Renan (Renant) berpendapat bangsa terbentuk bukan karena persamaan ras, bahasa, atau wilayah, melainkan karena <b>adanya keinginan untuk hidup bersama dengan perasaan setia kawan</b> (<i>le désir de vivre ensemble</i>)—kehendak bersatu dari dalam hati.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Keinginan untuk menonjol di antara bangsa-bangsa lain</b> — Renan tidak menekankan ambisi eksterior; fokusnya pada rasa kebersamaan ke dalam.<br>• <b>Sekelompok manusia yang mempunyai persamaan karakter</b> — ini pandangan <b>Otto Bauer</b>, bukan Renan.<br>• <b>Adanya hasrat bersatu untuk kesatuan antara manusia dan alam sekitarnya</b> — Renan bicara solidaritas antar manusia, bukan hubungan manusia-alam."},
{id:28,q:"Nasionalisme adalah suatu kepercayaan yang dimiliki oleh sebagian besar individu di mana mereka menyatakan rasa kebangsaan sebagai perasaan memiliki secara bersama di dalam suatu bangsa. Merupakan pandangan dari....",opts:["Joseph Ernest Renant","Otto Bauar","Louis Snyder","L. Stoddard"],ans:2, exp:"Pernyataan \"nasionalisme adalah suatu kepercayaan yang dimiliki oleh sebagian besar individu di mana mereka menyatakan rasa kebangsaan sebagai perasaan memiliki secara bersama\" adalah definisi dari <b>L. Stoddard</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Joseph Ernest Renant</b> — Renan mendefinisikan bangsa dari sisi \"keinginan untuk hidup bersama,\" bukan \"kepercayaan yang dimiliki bersama.\"<br>• <b>Otto Bauar</b> — Bauer mendefinisikan bangsa berdasarkan \"persamaan perangai dan tingkah laku dalam perjuangan nasib.\"<br>• <b>Louis Snyder</b> — Snyder mendefinisikan nasionalisme sebagai emosi yang sangat kuat berkaitan dengan rasa kebangsaan; beda redaksinya dari L. Stoddard."},
{id:29,q:"Menurut Lukman Soetrisno, suatu pembangunan telah melaksanakan HAM apabila menunjukkan adanya ciri-ciri sebagai berikut, kecuali....",opts:["Dalam bidang politik berupa kemauan mengakui pluralisme pendapat","Dalam bidang sosial berupa perlakuan yang sama oleh hukum antara wong cilik dan priyayi","Dalam bidang ekonomi yaitu dengan tidak adanya monopoli","Dalam bidang militer bahwa rakyat harus tunduk pada kekuatan militer negara"],ans:3, exp:"Menurut Lukman Soetrisno, pembangunan yang melaksanakan HAM ditandai antara lain dengan mengakui pluralisme politik, perlakuan hukum yang sama, dan tidak adanya monopoli ekonomi. <b>\"Rakyat harus tunduk pada kekuatan militer\"</b> adalah pelanggaran HAM, bukan ciri pembangunan yang menghormati HAM.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Kemauan mengakui pluralisme politik</b> — ciri positif pembangunan yang melaksanakan HAM.<br>• <b>Perlakuan yang sama oleh hukum</b> — kesetaraan di depan hukum adalah prinsip dasar HAM.<br>• <b>Tidak adanya monopoli ekonomi</b> — kebebasan ekonomi dan anti-monopoli adalah bagian dari hak ekonomi warga negara."},
{id:30,q:"Pasal 362 KUHP menyatakan barang siapa mengambil sesuatu seluruhnya atau sebagian kepunyaan orang lain dengan maksud untuk dimiliki secara melawan hukum, diancam karena pencurian dengan....",opts:["Pidana penjara atau denda","Pidana penjara","Denda","Perampasan dan denda"],ans:0, exp:"Pasal 362 KUHP tentang pencurian mengancam dengan <b>pidana penjara paling lama 5 tahun atau pidana denda paling banyak sembilan ratus rupiah</b>. Kata \"atau\" berarti hakim bisa memilih salah satu dari dua jenis sanksi tersebut.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pidana penjara</b> — hanya menyebut satu jenis sanksi, padahal Pasal 362 memberi dua alternatif.<br>• <b>Denda</b> — sama seperti di atas, hanya satu sanksi.<br>• <b>Perampasan dan denda</b> — Pasal 362 tidak menyebutkan perampasan; perampasan diatur di pasal pencurian dengan pemberatan."},
{id:31,q:"Menurut Dr. Mr. Kirch, bahwa hukum adalah....",opts:["Suatu gejala pergaulan hidup yang bergolak terus menerus dalam keadaan bentur membentur tanpa henti dengan gejala lainnya","Sulit untuk membuat definisi tentang hukum yang memuaskan masyarakat","Pikiran/anggapan orang tentang adil dan tidak adil","Peraturan tentang perbuatan moral yang menjamin keadilan"],ans:0, exp:"<b>Dr. Mr. Kirch</b> mendefinisikan hukum sebagai <b>\"suatu gejala pergaulan hidup yang bergolak terus-menerus dalam keadaan bentur-membentur tanpa henti dengan gejala lainnya.\"</b> Definisi ini menekankan sifat dinamis hukum sebagai fenomena sosial yang terus berinteraksi.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>\"Sulit untuk membuat definisi tentang hukum yang memuaskan\"</b> — ini pernyataan <b>Van Apeldoorn</b>, bukan Kirch.<br>• <b>\"Pikiran/anggapan orang tentang adil dan tidak adil\"</b> — definisi dari perspektif sosiologi/filsafat hukum umum, bukan dari Kirch.<br>• <b>\"Peraturan tentang perbuatan moral yang menjamin keadilan\"</b> — definisi dari perspektif etis/moral (seperti Aristoteles), bukan dari Kirch."},
{id:32,q:"Pengetahuan, skill, perilaku warga negara yang demokratis tidak akan terjadi dengan sendirinya, tetapi harus diajarkan kepada generasi penerus merupakan pandangan dari....",opts:["Gandal dan Finn","Sumantri","Ahmad Sanusi","Thomas Jefferson"],ans:0, exp:"Pernyataan bahwa <b>\"pengetahuan, skill, dan perilaku warga negara yang demokratis tidak akan terjadi dengan sendirinya\"</b> adalah pandangan dari <b>Gandal dan Finn (1992)</b>. Mereka menyebut: <i>\"democracy does not teach itself.\"</i><br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Sumantri</b> — tokoh PKn Indonesia, tidak dikenal dengan pernyataan spesifik ini.<br>• <b>Ahmad Sanusi</b> — pemikir PKn Indonesia yang fokus pada demokrasi Pancasila, bukan penggagas ungkapan tersebut.<br>• <b>Thomas Jefferson</b> — Bapak Demokrasi Amerika yang memiliki banyak pemikiran tentang demokrasi, namun ungkapan ini bukan dari Jefferson melainkan dari Gandal dan Finn."},
{id:33,q:"Strategi pengembangan sikap demokratis melalui pertemuan kelas guna membahas berita aktual yang ada di media massa merupakan strategi....",opts:["Pertemuan kelas berita baru","Cambuk bersiklus","Waktu untuk penghargaan","Pertemuan perumusan tujuan"],ans:0, exp:"Strategi <b>pertemuan kelas berita baru</b> adalah strategi di mana siswa berkumpul untuk membahas <b>berita aktual dari media massa</b>. Melatih siswa merespons isu-isu kontemporer secara kritis dan demokratis.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Cambuk bersiklus</b> — strategi saling bertanya-jawab secara bergiliran; berbeda dari membahas berita.<br>• <b>Waktu untuk penghargaan</b> — memberikan waktu khusus untuk menghargai kontribusi positif siswa, bukan diskusi berita.<br>• <b>Pertemuan perumusan tujuan</b> — digunakan untuk menyusun tujuan belajar bersama di awal pembelajaran."},
{id:34,q:"Menurut Kansil, peraturan hidup yang timbul dari pergaulan segolongan manusia dan ditaati sebagai pedoman tingkah laku terhadap manusia di sekitarnya, merupakan norma....",opts:["Kesopanan","Kesusilaan","Adat","Hukum"],ans:0, exp:"Menurut Kansil, <b>norma kesopanan</b> adalah peraturan hidup yang timbul dari pergaulan segolongan manusia dan ditaati sebagai pedoman tingkah laku terhadap sesama. Bersumber dari kebiasaan sosial dan bersifat relatif sesuai lingkungan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kesusilaan</b> — bersumber dari hati nurani manusia sendiri, berkaitan dengan perasaan batin tentang baik dan buruk, bukan dari pergaulan sosial setempat.<br>• <b>Adat</b> — aturan yang sudah lama ada dan lebih formal serta mengikat secara tradisi, berbeda dari sekadar norma pergaulan.<br>• <b>Hukum</b> — bersumber dari lembaga resmi (negara) yang berwenang, memiliki sanksi tegas, bukan dari pergaulan biasa."},
{id:35,q:"Kelompok portofolio yang mengembangkan kebijakan publik yang akan didukung oleh seluruh kelas, adalah....",opts:["Kelompok portofolio satu","Kelompok portofolio dua","Kelompok portofolio tiga","Kelompok portofolio empat"],ans:2, exp:"Dalam model portofolio, kelas dibagi 4 kelompok. <b>Kelompok portofolio tiga</b> bertugas khusus <b>mengembangkan kebijakan publik yang akan didukung oleh seluruh kelas</b>—merumuskan dan menjelaskan kebijakan terbaik yang dipilih.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kelompok portofolio satu</b> — bertugas mengidentifikasi dan menjelaskan masalah kebijakan publik yang akan dikaji.<br>• <b>Kelompok portofolio dua</b> — bertugas mengkaji kebijakan alternatif yang ada atau pernah diusulkan.<br>• <b>Kelompok portofolio empat</b> — bertugas membuat rencana tindakan (action plan) untuk mempengaruhi kebijakan pemerintah."},
{id:36,q:"Pendidikan nilai moral berpijak pada teori Piaget dan Kohlberg yang menitik beratkan pada....",opts:["Penalaran moral","Perilaku moral","Sikap moral","Berpikir kritis"],ans:0, exp:"Pendidikan nilai moral yang berpijak pada teori <b>Piaget dan Kohlberg</b> menitikberatkan pada <b>penalaran moral</b>—kemampuan berpikir bertahap tentang mengapa sesuatu itu benar atau salah. Keduanya menekankan perkembangan moral sebagai proses kognitif.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Perilaku moral</b> — lebih berkaitan dengan teori behaviorisme (Skinner, Bandura) yang menekankan pembiasaan perilaku, bukan penalaran.<br>• <b>Sikap moral</b> — berkaitan dengan kecenderungan afektif/emosional, lebih terkait dengan pendekatan karakter seperti Lickona.<br>• <b>Berpikir kritis</b> — kemampuan kognitif yang lebih luas; Piaget dan Kohlberg lebih spesifik pada penalaran moral."},
{id:37,q:"Menurut Piaget, tahapan pada domain pelaksanaan aturan pada usia 10-12 tahun akan berperilaku, yaitu....",opts:["Aturan dilakukan sebagai hal yang hanya bersifat motorik","Aturan dilakukan sebagai perilaku yang lebih berorientasi pada diri sendiri","Pada usia ini aturan diterima sebagai perwujudan dari kesepakatan","Aturan diterima sebagai ketentuan yang sudah dihimpun"],ans:2, exp:"Soal menanyakan domain <b>pelaksanaan aturan</b> usia 10–12 tahun. Menurut Piaget, pada usia ini aturan <b>diterima sebagai perwujudan dari kesepakatan</b>—anak mulai memahami bahwa aturan bisa berubah jika ada persetujuan bersama.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Aturan dilakukan sebagai hal yang hanya bersifat motorik</b> — tahap awal (0–2 tahun) di mana bayi melakukan gerakan berulang tanpa kesadaran aturan.<br>• <b>Aturan dilakukan sebagai perilaku yang lebih berorientasi pada diri sendiri</b> — ciri tahap usia 2–6 tahun (egosentris), bukan 10–12 tahun.<br>• <b>Aturan diterima sebagai ketentuan yang sudah dihimpun</b> — lebih menggambarkan tahap usia yang lebih matang di mana aturan dipandang sebagai produk masyarakat yang sudah mapan."},
{id:38,q:"Tahap-tahap penyajian portofolio, meliputi....",opts:["Persiapan, pelaksanaan, dan refleksi","Pembukaan, pelaksanaan, dan penutupan","Mukadimah, kegiatan inti, dan kegiatan penutup","Pembukaan, kegiatan inti, dan refleksi"],ans:0, exp:"Tahap-tahap penyajian portofolio terdiri dari: <b>Persiapan</b> (kesiapan portofolio dan tempat), <b>Pelaksanaan</b> (show case, dialog dengan juri), dan <b>Refleksi</b> (evaluasi dan menghindari kesalahan ke depan).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pembukaan, pelaksanaan, dan penutupan</b> — ini format acara umum, bukan istilah teknis tahapan portofolio PKn.<br>• <b>Mukadimah, kegiatan inti, dan kegiatan penutup</b> — ini format RPP/skenario pembelajaran, bukan tahapan penyajian portofolio.<br>• <b>Pembukaan, kegiatan inti, dan refleksi</b> — meskipun ada \"refleksi,\" tidak ada \"pembukaan\" sebagai tahap resmi; istilah yang benar adalah \"persiapan\"."},
{id:39,q:"Pembelajaran nilai dan moral dalam PKn dituntut harus berpikir kritis, artinya ....",opts:["Proses psikologis untuk memberikan penilaian terhadap suatu objek atau fenomena dengan informasi yang akurat dan otentik","Proses psikologis untuk memahami sesuatu objek dengan logika","Proses psikologis untuk menghasilkan suatu cara atau proses baru","Proses psikologis untuk mampu mempengaruhi pikiran orang lain"],ans:0, exp:"Berpikir kritis dalam PKn adalah <b>\"proses psikologis untuk memberikan penilaian terhadap suatu objek atau fenomena dengan informasi yang akurat dan otentik.\"</b> Siswa mengevaluasi nilai berdasarkan fakta yang dapat dipertanggungjawabkan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Proses psikologis untuk memahami sesuatu objek</b> — menggambarkan pemahaman (comprehension), bukan penilaian kritis.<br>• <b>Proses psikologis untuk menghasilkan suatu cara atau solusi</b> — menggambarkan pemecahan masalah (problem solving), bukan berpikir kritis.<br>• <b>Proses psikologis untuk mampu mempengaruhi pikiran</b> — menggambarkan persuasi atau retorika, bukan berpikir kritis."},
{id:40,q:"Potensi dasar mental manusia yang dapat dikembangkan menurut Nursid, salah satunya adalah dorongan ingin tahu yang sering disebut dengan istilah....",opts:["Sense of interest","Sense of curiosity","Sense of reality","Sense of inquiry"],ans:1, exp:"Menurut Nursid Sumaatmadja (1998), <b>sense of curiosity</b> adalah <b>dorongan ingin tahu</b> terhadap suatu objek atau fenomena yang menarik perhatian—berbeda dari sense of interest meskipun keduanya berkaitan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Sense of interest</b> — dorongan <b>minat/ketertarikan</b>. Ini mendahului curiosity: seseorang tertarik (interest) lalu ingin tahu lebih (curiosity).<br>• <b>Sense of reality</b> — dorongan ingin <b>membuktikan</b> suatu kenyataan, mengkonfirmasi sesuatu yang sudah dipertanyakan.<br>• <b>Sense of inquiry</b> — dorongan ingin <b>menyelidiki</b> secara metodis dan aktif."},
{id:41,q:"Setiap warga negara mampu mencari serta menggunakan informasi maka akan memperoleh kemanfaatan, kecuali....",opts:["Memperluas wawasan pemikirannya","Membentuk individu yang liberalis tanpa tergantung pada orang lain dan masyarakat sekitarnya","Meningkatkan keterampilan mengambil keputusan (decision making)","Mendorong karakter warga negara yang cerdas, bertanggung jawab, dan berpartisipasi"],ans:1, exp:"Yang <b>bukan</b> manfaat warga negara yang mampu mencari dan menggunakan informasi adalah: <b>\"membentuk individu yang liberalis tanpa tergantung pada orang lain dan masyarakat sekitarnya.\"</b> PKn justru menekankan keterlibatan sosial dan tanggung jawab komunal, bukan individualisme liberal.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Memperluas wawasan pemikirannya</b> — manfaat nyata dari kemampuan mencari informasi.<br>• <b>Meningkatkan keterampilan mengambil keputusan</b> — informasi yang baik mendukung pengambilan keputusan yang lebih rasional.<br>• <b>Mendorong karakter warga negara yang cerdas</b> — tujuan utama PKn: mencetak warga negara yang cerdas dan berkarakter."},
{id:42,q:"Secara konseptual 'value education' berarti pendidikan ....",opts:["Nilai","Moral","Etis","Pancasila"],ans:0, exp:"Secara etimologis, <b>value education = pendidikan nilai</b>. Kata \"value\" dalam bahasa Inggris berarti \"nilai\" dalam bahasa Indonesia. Pendidikan nilai berkaitan dengan pengembangan dan penanaman nilai-nilai dalam diri seseorang.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Moral</b> — \"moral education\" bukan \"value education.\" Pendidikan moral cakupannya lebih sempit, hanya berfokus pada persoalan baik-buruk.<br>• <b>Etis</b> — \"ethics education.\" Etika adalah cabang filsafat tentang moralitas, bukan terjemahan langsung dari \"value.\"<br>• <b>Pancasila</b> — \"Pancasila education\" adalah istilah khusus untuk pendidikan berbasis ideologi Pancasila, bukan terjemahan dari \"value education\"."},
{id:43,q:"Keberhasilan meraih kemerdekaan bangsa Indonesia sebagai rahmat Allah ditegaskan dalam....",opts:["Pasal 29 (1) UUD 1945","Sila 1 Pancasila","Pasal 29 (2) UUD 1945","Pembukaan UUD 1945 alinea ke-3"],ans:3, exp:"Kalimat tentang kemerdekaan sebagai \"rahmat Allah Yang Maha Kuasa\" ada dalam <b>Pembukaan UUD 1945 alinea ke-3</b>: <i>\"Atas berkat rahmat Allah Yang Maha Kuasa dan dengan didorongkan oleh keinginan luhur... maka rakyat Indonesia menyatakan dengan ini kemerdekaannya.\"</i><br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pasal 29 (1) UUD 1945</b> — berbunyi \"Negara berdasar atas Ketuhanan Yang Maha Esa,\" tentang dasar negara, bukan kemerdekaan.<br>• <b>Sila 1 Pancasila</b> — berbunyi \"Ketuhanan Yang Maha Esa,\" prinsip dasar Pancasila, bukan pernyataan kemerdekaan.<br>• <b>Pasal 29 (2) UUD 1945</b> — tentang jaminan negara terhadap kebebasan beragama dan beribadat."},
{id:44,q:"Beberapa prinsip penilaian yang harus diketahui oleh setiap pendidik untuk menghasilkan penilaian yang adil antara lain adalah ....",opts:["Subjektif","Obyektif","Positif","Negatif"],ans:1, exp:"Memberikan nilai sesuai dengan apa yang sesungguhnya dicapai siswa—tanpa dipengaruhi subjektivitas atau pertimbangan di luar kemampuan akademik—adalah prinsip penilaian yang disebut <b>objektif</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Subjektif</b> — justru berlawanan; penilaian subjektif dipengaruhi opini dan perasaan penilai.<br>• <b>Positif</b> — bukan istilah teknis prinsip penilaian yang standar dalam teori evaluasi pendidikan.<br>• <b>Negatif</b> — bukan istilah teknis prinsip penilaian; bukan kategori prinsip evaluasi yang valid."},
{id:45,q:"Sistem tata kehidupan bernegara yang mengutamakan pola hubungan antara pemerintah dan yang diperintah adalah sistem ....",opts:["Ideologis","Personal","Kelembagaan","Kewilayahan"],ans:1, exp:"Sistem tata kehidupan bernegara yang <b>mengutamakan pola hubungan antara pemerintah dan yang diperintah</b> adalah sistem <b>personal</b>—menitikberatkan relasi interpersonal antara penguasa dan rakyat.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Ideologis</b> — mengutamakan ideologi atau paham tertentu sebagai landasan tata pemerintahan.<br>• <b>Kelembagaan</b> — menekankan peran lembaga/institusi negara (DPR, eksekutif, yudikatif) dalam penyelenggaraan negara.<br>• <b>Kewilayahan</b> — mengutamakan pembagian wilayah (federalisme atau otonomi daerah) dalam tata pemerintahan."},
{id:46,q:"Sebagai warga negara dalam melaksanakan tanggung jawab harus memperhatikan....",opts:["Aturan-aturan yang berlaku","Kepentingan pribadi","Kepentingan golongan tertentu","Keuntungan dan kerugian yang akan diperoleh"],ans:0, exp:"Dalam melaksanakan tanggung jawab warga negara, aspek terpenting adalah <b>aturan-aturan yang berlaku</b>. Tanggung jawab harus dijalankan dalam koridor hukum dan norma agar tidak merugikan kepentingan umum.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kepentingan pribadi</b> — mengutamakan kepentingan pribadi dalam tanggung jawab dapat bertentangan dengan kepentingan bersama.<br>• <b>Kepentingan golongan tertentu</b> — rentan mengarah pada diskriminasi dan tidak adil bagi golongan lain.<br>• <b>Keuntungan dan kerugian yang akan diperoleh</b> — tanggung jawab warga negara bersifat kewajiban moral dan hukum, tidak semata-mata dihitung dari untung-rugi."},
{id:47,q:"Tuntutan pedagogis memerlukan persiapan mental, profesionalitas, dan hubungan sosial guru dengan murid yang kohesif. Untuk itu, guru seyogianya....",opts:["Mau memberi contoh dan menjadi contoh","Mampu memberi contoh dan menjadi contoh","Kadang-kadang memberi contoh dan menjadi contoh","Sering memberi contoh dan menjadi contoh"],ans:1, exp:"Tuntutan pedagogis mensyaratkan guru <b>mampu</b> (bukan sekadar mau, kadang-kadang, atau sering) memberi contoh dan menjadi contoh—ini menyangkut kapabilitas profesional yang wajib dikuasai.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Mau memberi contoh dan menjadi contoh</b> — \"mau\" hanya menyatakan niat, bukan kemampuan aktual; guru harus <i>kompeten</i>, bukan sekadar berniat.<br>• <b>Kadang-kadang memberi contoh</b> — keteladanan guru harus konsisten, bukan sesekali.<br>• <b>Sering memberi contoh</b> — \"sering\" masih menyisakan saat tidak memberikan teladan, padahal keteladanan harus menjadi karakter permanen."},
{id:48,q:"Pembelajaran di kelas I sampai dengan kelas III dilaksanakan melalui pendekatan....",opts:["Tematik","Mata pelajaran","Satuan pendidikan","Jenjang pendidikan"],ans:0, exp:"Sesuai KTSP dan Kurikulum 2013, pembelajaran di kelas I–III SD dilaksanakan melalui pendekatan <b>tematik</b>. Dipilih karena siswa kelas rendah masih berpikir holistik (tahap operasional konkret Piaget) dan belum bisa memisahkan mata pelajaran secara abstrak.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Mata pelajaran</b> — pendekatan ini baru diterapkan di kelas IV–VI SD atau di SMP ke atas.<br>• <b>Satuan pendidikan</b> — bukan pendekatan pembelajaran, melainkan unit penyelenggara pendidikan.<br>• <b>Jenjang pendidikan</b> — klasifikasi tingkatan sekolah (SD, SMP, SMA), bukan pendekatan pembelajaran."},
{id:49,q:"Model pembelajaran portofolio diadopsi dari model pembelajaran yang bernama....",opts:["Portofolio model of learning","We the people project citizen","Learning for democratic teaching models","We the model of democratic teaching"],ans:1, exp:"Model pembelajaran portofolio diadopsi dari <b>We the People... Project Citizen</b>—program yang dikembangkan oleh Center for Civic Education (CCE) Amerika Serikat. Program ini mengajak siswa mengidentifikasi masalah kebijakan publik dan membuat rencana tindakan demokratis.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Portfolio model of learning</b> — bukan nama program spesifik yang menjadi sumber adopsi portofolio PKn.<br>• <b>Learning for democratic teaching models</b> — bukan nama program yang dikenal sebagai asal model portofolio PKn Indonesia.<br>• <b>We the model of democratic teaching</b> — bukan nama program yang ada; yang benar adalah \"We the People... Project Citizen\"."},
{id:50,q:"Arti yang tepat dari konsep apatisme, adalah....",opts:["Tidak punya minat atau perhatian terhadap orang lain, situasi maupun gejala","Perasaan yang menghayati tindakan dan motif orang lain dengan kecurigaan","Perasaan keterasingan seseorang dari politik","Perasaan kehilangan nilai dan ketiadaan arah"],ans:0, exp:"<b>Apatisme</b> berarti <b>tidak punya minat atau perhatian terhadap orang lain, situasi, maupun gejala</b>—sikap acuh tak acuh dan tidak peduli terhadap kondisi di sekitarnya, termasuk kondisi politik dan sosial.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Perasaan yang menghayati tindakan dan motif orang lain</b> — ini menggambarkan <i>empati</i>, bukan apatisme.<br>• <b>Perasaan keterasingan seseorang dari politik</b> — ini adalah <b>alienasi politik</b>; orang yang terasing bisa masih peduli tapi merasa tidak bisa berpengaruh.<br>• <b>Perasaan kehilangan nilai dan ketiadaan arah</b> — ini adalah <b>anomie</b> (konsep Durkheim), kondisi tanpa norma yang jelas; berbeda dari sekadar tidak berminat."},
{id:51,q:"Berikut ini faktor-faktor yang perlu dipertimbangkan guru SD dalam penggunaan alat tes PKn SD dalam penilaian, kecuali ....",opts:["TIK","Keadaan murid","Karakteristik pengajaran","Keadaan guru"],ans:3, exp:"Faktor yang perlu dipertimbangkan guru dalam penggunaan alat tes: TIK, keadaan murid, dan karakteristik pengajaran. <b>Keadaan guru</b> bukan faktor yang perlu dipertimbangkan—penilaian harus berpusat pada kebutuhan dan kemampuan siswa, bukan kondisi guru.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>TIK (Tujuan Instruksional Khusus)</b> — alat tes dipilih berdasarkan tujuan pembelajaran yang ingin diukur (kognitif/afektif/psikomotorik).<br>• <b>Keadaan murid</b> — kemampuan, usia, dan kondisi siswa menentukan jenis tes yang sesuai.<br>• <b>Karakteristik pengajaran</b> — jenis materi dan metode yang digunakan mempengaruhi pilihan alat penilaian."},
{id:52,q:"Dibawah ini merupakan ciri-ciri esai yaitu sebagai berikut, kecuali ..",opts:["Siswa menyusun dan menyatakan jawaban dengan kata-kata sendiri","Siswa menghabiskan sebagian waktu untuk berfikir dan menulis jawaban","Kualitas tes amat ditentukan oleh pemeriksa","Dalam menyatakan tugas siswa kurang jelas"],ans:3, exp:"Ciri soal esai: siswa menyusun jawaban sendiri, menghabiskan waktu berpikir dan menulis, kualitas tes ditentukan pemeriksa. <b>\"Dalam menyatakan tugas siswa kurang jelas\"</b> adalah <b>kelemahan esai yang buruk</b>, bukan ciri esai yang baik.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Siswa menyusun jawaban dengan kata-katanya sendiri</b> — ciri khas soal esai yang membedakannya dari pilihan ganda.<br>• <b>Siswa menghabiskan sebagian waktu untuk berpikir dan menulis</b> — esai membutuhkan waktu lebih karena memerlukan konstruksi jawaban lengkap.<br>• <b>Kualitas tes amat ditentukan oleh pemeriksa</b> — ciri esai karena penilaiannya bersifat subjektif tergantung kemampuan penilai."},
{id:53,q:"Hakikat bidang studi PKN antara lain terletak pada guru SD untuk membimbing siswa dalam mencapai tujuan pembelajaran adalah berupa ....",opts:["Strategi pembelajaran","Metode pembelajaran","Teknik pembelajaran","Proses pembelajaran"],ans:3, exp:"Hakikat bidang studi PKn untuk membimbing siswa mencapai tujuan berkaitan dengan <b>proses pembelajaran</b>—yaitu keseluruhan rangkaian kegiatan belajar mengajar yang dikelola dan diarahkan agar mencapai tujuan. Inilah yang menjadi hakikat operasional PKn di SD.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Strategi pembelajaran</b> — rencana atau pendekatan umum dalam mengajar; bagian dari proses, bukan inti hakikat bidang studi.<br>• <b>Metode pembelajaran</b> — cara spesifik menyampaikan materi (ceramah, diskusi, dll.); lebih operasional dan teknis.<br>• <b>Teknik pembelajaran</b> — implementasi konkret dari metode; level yang paling teknis dan spesifik."},
{id:54,q:"Menurut Kohlberg, ciri utama moralitas pada tahap ini adalah bahwa sesuatu hal dipandang baik dengan pertimbangan untuk memenuhi anggapan orang lain baik atau buruk karena memang disepakati, merupakan ciri dari tahap....",opts:["Orientasi hukuman dan kepatuhan","Orientasi instrumen nisbi","Orientasi kesepakatan timbal balik","Orientasi hukum dan ketertiban"],ans:2, exp:"Menurut Kohlberg, ciri bahwa \"sesuatu dipandang baik karena memenuhi anggapan orang lain baik, atau baik karena disepakati\" adalah ciri <b>Orientasi Kesepakatan Timbal Balik</b> (Tahap 3, Tingkat Konvensional).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Orientasi hukuman dan kepatuhan</b> — Tahap 1 Prakonvensional; sesuatu dianggap baik karena menghindari hukuman.<br>• <b>Orientasi instrumen nisbi</b> — Tahap 2 Prakonvensional; sesuatu dianggap baik jika menguntungkan diri sendiri (take and give).<br>• <b>Orientasi hukum dan ketertiban</b> — Tahap 4 Konvensional; sesuatu dianggap baik karena sesuai dengan hukum dan aturan formal masyarakat."},
{id:55,q:"Berikut ini yang bukan merupakan pernyataan tentang perlunya membina dan melestarikan nilai-nilai luhur budaya daerah bagi pengembangan budaya bangsa....",opts:["Terhindarnya dari pengaruh bangsa asing yang tidak sesuai","Dapat melestarikan nilai-nilai budaya luhur bangsa Indonesia","Dapat mengembangkan budaya nasional bangsa Indonesia","Dapat mempertahankan jati diri bangsa Indonesia"],ans:0, exp:"Yang <b>bukan</b> pernyataan perlunya membina kebudayaan daerah: <b>\"terhindarnya dari pengaruh bangsa asing yang tidak sesuai.\"</b> Tujuan membina budaya daerah adalah melestarikan, mengembangkan budaya nasional, dan menjaga jati diri—bukan untuk mengisolasi diri dari pengaruh asing.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Dapat melestarikan nilai-nilai budaya luhur bangsa</b> — tujuan utama pembinaan budaya daerah.<br>• <b>Dapat mengembangkan budaya nasional bangsa Indonesia</b> — budaya daerah adalah bahan baku pembangunan budaya nasional.<br>• <b>Dapat mempertahankan jati diri bangsa Indonesia</b> — keanekaragaman budaya daerah adalah identitas unik bangsa Indonesia."},
{id:56,q:"Landasan hukum tentang Bhinneka Tunggal Ika terdapat dalam Pancasila sila....",opts:["Kedua: Kemanusiaan yang Adil dan Beradab","Ketiga: Persatuan Indonesia","Keempat: Kerakyatan yang dipimpin oleh hikmat kebijaksanaan","Kelima: Keadilan sosial bagi seluruh rakyat Indonesia"],ans:1, exp:"Semboyan Bhinneka Tunggal Ika (berbeda-beda namun tetap satu juga) mencerminkan cita-cita persatuan di tengah keberagaman—merupakan perwujudan dari <b>Sila Ketiga Pancasila: Persatuan Indonesia</b>.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kedua: Kemanusiaan yang Adil dan Beradab</b> — tentang penghargaan terhadap martabat manusia secara universal, bukan spesifik tentang persatuan dalam keberagaman.<br>• <b>Keempat: Kerakyatan yang dipimpin oleh hikmat kebijaksanaan</b> — tentang demokrasi dan musyawarah mufakat.<br>• <b>Kelima: Keadilan sosial bagi seluruh rakyat Indonesia</b> — tentang pemerataan dan keadilan ekonomi-sosial."},
{id:57,q:"Pengadilan Banding yang mengadili lagi pada tingkat kedua suatu perkara perdata atau pidana yang telah diputuskan oleh pengadilan negeri adalah....",opts:["Pengadilan Negeri","Pengadilan Tinggi","Pengadilan Tingkat Kasasi","Pengadilan Tata Usaha Negara"],ans:1, exp:"<b>Pengadilan Tinggi</b> adalah pengadilan banding yang memeriksa kembali perkara perdata atau pidana yang telah diputuskan Pengadilan Negeri pada tingkat pertama.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pengadilan Negeri</b> — pengadilan tingkat pertama, bukan banding; di sinilah perkara pertama kali disidangkan.<br>• <b>Pengadilan Tingkat Kasasi</b> — dilakukan Mahkamah Agung, tingkat ketiga; memeriksa penerapan hukumnya, bukan fakta perkara.<br>• <b>Pengadilan Tata Usaha Negara</b> — mengadili sengketa administrasi antara warga dan pemerintah, bukan perkara perdata/pidana umum."},
{id:58,q:"Semua hasil karya manusia yang berdasarkan cipta, rasa, karsa, dan karya merupakan arti dari....",opts:["Kebudayaan","Masyarakat","Teknologi","Kesenian"],ans:0, exp:"<b>Kebudayaan</b> mencakup semua hasil karya manusia yang berdasarkan cipta (kreativitas), rasa (estetika), karsa (kehendak), dan karya (hasil nyata)—sangat luas, mencakup benda maupun non-benda, seni maupun teknologi.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Masyarakat</b> — kumpulan manusia yang hidup bersama; bukan produk dari cipta-rasa-karsa-karya, melainkan subjek yang menghasilkan kebudayaan.<br>• <b>Teknologi</b> — hanya salah satu <i>bagian</i> dari kebudayaan (hasil karya), bukan keseluruhan definisi kebudayaan.<br>• <b>Kesenian</b> — juga hanya salah satu <i>bagian</i> dari kebudayaan (hasil rasa dan cipta)."},
{id:59,q:"Nenek moyang bangsa Indonesia berdatangan ke pulau yang ada di Indonesia dalam waktu yang cukup lama dan berbeda-beda, mereka berupaya mempertahankan diri sehingga berkembang sejalan dengan pengalaman, merupakan latar belakang kemajemukan ditinjau dari aspek....",opts:["Historis","Geografis","Sosiologi dan kultural","Politis"],ans:2, exp:"Fakta bahwa nenek moyang berdatangan dalam waktu berbeda dan menyesuaikan diri dengan lingkungan sehingga berkembang budaya yang beragam adalah latar belakang dari aspek <b>sosiologi dan kultural</b>—proses adaptasi sosial dan perkembangan identitas budaya lokal yang berbeda-beda.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Historis</b> — lebih berkaitan dengan peristiwa sejarah dan perkembangan kerajaan, bukan proses adaptasi sosiologis nenek moyang.<br>• <b>Geografis</b> — berkaitan dengan kondisi fisik wilayah (gunung, laut, iklim) yang mempengaruhi peradaban, bukan proses migrasi dan adaptasi budaya.<br>• <b>Politis</b> — berkaitan dengan kekuasaan, pemerintahan, dan kebijakan negara."},
{id:60,q:"Kejaksaan Negeri daerah hukumnya meliputi....",opts:["Wilayah kecamatan","Wilayah kabupaten dan kotamadya","Wilayah propinsi","Wilayah negara"],ans:1, exp:"<b>Kejaksaan Negeri</b> memiliki daerah hukum yang meliputi <b>wilayah kabupaten dan kotamadya</b>. Hierarki kejaksaan: Kejaksaan Agung (nasional) → Kejaksaan Tinggi (provinsi) → Kejaksaan Negeri (kabupaten/kota).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Wilayah kecamatan</b> — tidak ada kejaksaan di tingkat kecamatan; wilayah kecamatan masuk yurisdiksi Kejaksaan Negeri.<br>• <b>Wilayah provinsi</b> — ini wilayah hukum <b>Kejaksaan Tinggi</b>, bukan Kejaksaan Negeri.<br>• <b>Wilayah negara</b> — ini wilayah hukum <b>Kejaksaan Agung</b>, bukan Kejaksaan Negeri."},
{id:61,q:"Mata pelajaran IPS dan PPKn di SD merupakan pengajaran yang terpadu mengingat...",opts:["Siswa SD belum bisa berpikir abstrak","Siswa SD masih berpikir secara sederhana","Guru SD pada umumnya guru kelas","Guru SD merupakan sumber belajar"],ans:0, exp:"IPS dan PPKn di SD diajarkan secara terpadu karena <b>siswa SD belum bisa berpikir abstrak</b>—masih berada pada tahap operasional konkret (Piaget). Pembelajaran terpadu yang kontekstual lebih sesuai dengan perkembangan kognitif siswa yang masih berpikir holistik.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Siswa SD masih berpikir secara sederhana</b> — ada kebenarannya, tetapi bukan alasan teknis yang tepat; yang benar adalah ketidakmampuan berpikir <i>abstrak</i>.<br>• <b>Guru SD pada umumnya guru kelas</b> — alasan praktis administratif, bukan alasan pedagogis mengapa IPS dan PPKn dipadukan.<br>• <b>Guru SD merupakan sumber belajar</b> — pernyataan umum tentang peran guru, bukan alasan spesifik pemaduan."},
{id:62,q:"Tema disiplin yang dijaringkan dengan disiplin diri sendiri, di rumah, di sekolah, dan di masyarakat, merupakan jaring laba-laba....",opts:["Antara mata pelajaran PKn dengan lingkungan kehidupan siswa","Antara mata pelajaran PKn","Antara mata pelajaran lain dengan PKn","Antara mata pelajaran PKn dengan IPS"],ans:0, exp:"Tema \"disiplin\" yang dijaringkan dengan disiplin diri sendiri, di rumah, di sekolah, dan di masyarakat adalah jaring tema <b>antara mata pelajaran PKn dengan lingkungan kehidupan siswa</b>. Model webbed menghubungkan materi PKn dengan konteks kehidupan nyata siswa sehari-hari.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Antara mata pelajaran PKn (saja)</b> — keterkaitan ini terlalu sempit; tidak hanya internal PKn tetapi dikaitkan dengan berbagai lingkungan kehidupan.<br>• <b>Antara mata pelajaran lain dengan PKn</b> — formulasi terbalik; PKn-lah yang menjadi mata pelajaran utama yang dijaringkan.<br>• <b>Antara mata pelajaran PKn dengan IPS</b> — jaring tema ini tidak spesifik ke IPS, melainkan ke \"lingkungan kehidupan siswa\"."},
{id:63,q:"Kesadaran akan adanya masalah yang mendesak untuk dipecahkan dapat muncul dari, kecuali....",opts:["Media massa","Informasi guru","Kelompok warga","Lembaga swadaya masyarakat"],ans:1, exp:"Dalam pembelajaran portofolio, kesadaran akan masalah mendesak dapat muncul dari media massa, kelompok warga, dan LSM. <b>Informasi guru</b> bukan sumber yang dimaksud—identifikasi masalah harus bersumber dari kehidupan nyata warga negara dan masyarakat, bukan dari arahan guru.<br><br><b>Kenapa jawaban lain salah (ini soal KECUALI):</b><br>• <b>Media massa</b> — berita di koran, TV, internet merupakan sumber utama isu publik.<br>• <b>Kelompok warga</b> — komunitas lokal yang mengalami masalah langsung merupakan sumber autentik.<br>• <b>Lembaga swadaya masyarakat (LSM)</b> — LSM yang bergerak di bidang sosial-kemasyarakatan sering mengidentifikasi masalah publik yang perlu diatasi."},
{id:64,q:"Bidang studi PKn sebelum menjadi mata pelajaran atau bidang studi seperti sekarang ini adalah bagian dari mata pelajaran....",opts:["PKn","PMP","IPS","IKn"],ans:2, exp:"Sebelum menjadi mata pelajaran tersendiri, PKn adalah bagian dari <b>IPS</b>. Dalam Kurikulum SD 1968, IPS mencakup Ilmu Bumi, Sejarah, dan Civics—Civics inilah cikal bakal PKn yang kemudian berkembang menjadi PMP dan PPKn.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>PKn</b> — justru nama yang sedang ditanya asal usulnya; PKn belum ada sebagai mata pelajaran tersendiri sebelum menjadi bagian IPS.<br>• <b>PMP (Pendidikan Moral Pancasila)</b> — PMP lahir setelah Civics, bukan sebelumnya. Urutan: Civics (dalam IPS) → PMP → PPKn → PKn.<br>• <b>IKn</b> — singkatan yang tidak dikenal dalam sejarah kurikulum Indonesia."},
{id:65,q:"Orang-orang Kubu, Sakai dan Mentawai, secara fisik termasuk dalam golongan...",opts:["Papua Melanesoid","Mongoloid","Weddoid","Negroid"],ans:2, exp:"Orang-orang Kubu (Riau), Sakai (Riau), dan Mentawai (Sumatra Barat) secara fisik termasuk golongan <b>Weddoid</b>—ciri: perawakan kecil, kulit sawo matang, rambut berombak.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Papua Melanesoid</b> — tersebar di Papua dan kepulauan sekitarnya; ciri fisik berbeda (kulit lebih gelap, rambut keriting).<br>• <b>Mongoloid</b> — golongan terbesar di Indonesia, ciri: rambut lurus, muka agak bulat, kulit putih hingga sawo matang. Kubu, Sakai, dan Mentawai tidak termasuk Mongoloid.<br>• <b>Negroid</b> — penggolongan ras yang berbeda (umumnya merujuk Afrika Sub-Sahara)."},
{id:66,q:"Mata pelajaran PKn menurut kurikulum 1994 merupakan gabungan antara....",opts:["Pendidikan Pancasila dengan Pendidikan Agama","Pendidikan Pancasila dengan Pendidikan Kewarganegaraan","Pendidikan Pancasila dengan Bahasa Indonesia","Pendidikan Kewarganegaraan dengan Bahasa Indonesia"],ans:1, exp:"Menurut Kurikulum 1994, PPKn adalah gabungan dari <b>Pendidikan Pancasila</b> dengan <b>Pendidikan Kewarganegaraan</b>—menghasilkan singkatan PPKn (Pendidikan Pancasila dan Kewarganegaraan).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Pendidikan Pancasila dengan Pendidikan Agama</b> — Pendidikan Agama adalah mata pelajaran tersendiri, tidak tergabung dalam PPKn.<br>• <b>Pendidikan Pancasila dengan Bahasa Indonesia</b> — Bahasa Indonesia mata pelajaran tersendiri, tidak termasuk PPKn.<br>• <b>Pendidikan Kewarganegaraan dengan Bahasa Indonesia</b> — komponen yang benar adalah Pancasila dan Kewarganegaraan, bukan Bahasa Indonesia."},
{id:67,q:"Setiap orang berhak atas status kewarganegaraan. Pernyataan ini merupakan rumusan jaminan HAM yang terdapat dalam pasal 28D khususnya ayat....",opts:["1","2","3","4"],ans:3, exp:"Pasal 28D UUD 1945 terdiri dari 4 ayat. <b>Ayat (4)</b> menyatakan: \"Setiap orang berhak atas status kewarganegaraan.\" Urutan: ayat 1 (persamaan hukum), ayat 2 (hak bekerja), ayat 3 (hak kesempatan pemerintahan), ayat 4 (status kewarganegaraan).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Ayat 1</b> — \"Setiap orang berhak atas pengakuan, jaminan, perlindungan, dan kepastian hukum yang adil serta perlakuan yang sama di hadapan hukum.\"<br>• <b>Ayat 2</b> — \"Setiap orang berhak untuk bekerja serta mendapat imbalan dan perlakuan yang adil dan layak dalam hubungan kerja.\"<br>• <b>Ayat 3</b> — \"Setiap warga negara berhak memperoleh kesempatan yang sama dalam pemerintahan.\" "},
{id:68,q:"Pembelajaran tematik merupakan aplikasi pendekatan pembelajaran....",opts:["Integrated","Connected","Contextual","Fragmented"],ans:0, exp:"Pembelajaran tematik adalah aplikasi dari pendekatan <b>integrated</b> (terpadu), di mana berbagai disiplin dipadukan dalam satu tema yang bermakna. Ini melampaui connected (satu mata pelajaran) dan webbed (masih ada batas antar disiplin).<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Connected</b> — menghubungkan topik dalam <i>satu</i> mata pelajaran saja, belum lintas disiplin.<br>• <b>Contextual</b> — menghubungkan materi dengan konteks nyata kehidupan; bukan model tematik secara khusus.<br>• <b>Fragmented</b> — justru berlawanan dengan tematik; memisahkan mata pelajaran secara ketat."},
{id:69,q:"Ketahanan Nasional sangat erat keterkaitannya dengan pembangunan nasional, seperti dalam pernyataan berikut ....",opts:["Ketahanan nasional didasarkan pada pembangunan nasional","Ketahanan nasional adalah bagian dari pembangunan nasional","Pembangunan nasional merupakan dasar untuk mewujudkan ketahanan nasional","Berhasilnya pembangunan nasional akan meningkatkan ketahanan nasional"],ans:3, exp:"Hubungan ketahanan nasional dan pembangunan nasional bersifat saling mendukung. Pernyataan yang tepat: <b>\"Berhasilnya pembangunan nasional akan meningkatkan ketahanan nasional.\"</b> Pembangunan menciptakan kemakmuran dan stabilitas yang memperkuat ketahanan.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Ketahanan nasional didasarkan pada pembangunan nasional</b> — terbalik; keduanya saling mendukung, bukan yang satu didasarkan pada yang lain.<br>• <b>Ketahanan nasional adalah bagian dari pembangunan nasional</b> — keliru; keduanya adalah konsep yang setara, bukan yang satu bagian dari yang lain.<br>• <b>Pembangunan nasional merupakan dasar untuk mewujudkan ketahanan</b> — terlalu absolut; ketahanan nasional memiliki banyak elemen lain di luar pembangunan."},
{id:70,q:"Undang-Undang Republik Indonesia tentang HAM adalah....",opts:["UU Nomor 39 Tahun 1999","UU Nomor 49 Tahun 1999","UU Nomor 59 Tahun 1999","UU Nomor 69 Tahun 1999"],ans:0, exp:"Undang-Undang RI tentang HAM adalah <b>UU Nomor 39 Tahun 1999</b>. Angka 39 dan tahun 1999 adalah yang benar dan wajib diingat.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>UU Nomor 49 Tahun 1999</b> — nomor salah; tidak ada UU HAM dengan nomor 49.<br>• <b>UU Nomor 59 Tahun 1999</b> — nomor salah; tidak ada UU HAM dengan nomor 59.<br>• <b>UU Nomor 69 Tahun 1999</b> — nomor salah; tidak ada UU HAM dengan nomor 69."},
{id:71,q:"Untuk menjelaskan perbedaan antara pendekatan emosional dan pendekatan rasional dapat ditempuh guru dengan mengembangkan sikap ....",opts:["Kekeluargaan","Musyawarah","Tenggang rasa","Keikhlasan"],ans:1, exp:"Untuk menjelaskan perbedaan pendekatan emosional dan rasional, guru dapat mengembangkan nilai melalui <b>musyawarah</b>—karena musyawarah memadukan dimensi perasaan/empati (emosional) dengan nalar dan argumentasi (rasional) dalam proses mencapai mufakat bersama.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Kekeluargaan</b> — lebih bersifat emosional (rasa kasih sayang, kebersamaan), tidak secara langsung menggambarkan keseimbangan dua pendekatan.<br>• <b>Tenggang rasa</b> — lebih berkaitan dengan kepekaan emosional/empati, belum mencerminkan komponen rasional.<br>• <b>Keikhlasan</b> — nilai spiritual/moral yang lebih bersifat emosional dan personal."},
{id:72,q:"Senantiasa bersikap positif terhadap isu yang merusak kehidupan bernegara; tidak turut serta dalam perbuatan destruktif; tidak membiarkan adanya pelanggaran, mengandung nilai....",opts:["Rasa memiliki","Setia","Rela berkorban","Pengabdian"],ans:0, exp:"Selalu bersikap positif terhadap isu yang merusak kehidupan bernegara, tidak turut serta dalam perbuatan destruktif, dan tidak membiarkan pelanggaran adalah manifestasi dari <b>rasa memiliki</b>. Seseorang yang merasa memiliki negaranya akan melindungi dan menjaganya secara proaktif.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Setia</b> — kesetiaan (loyalitas) cenderung pasif—tidak melawan—sedangkan sikap proaktif menjaga negara mencerminkan rasa memiliki yang aktif.<br>• <b>Rela berkorban</b> — biasanya dalam situasi darurat/konflik; bersikap positif sehari-hari terhadap isu negatif lebih mencerminkan rasa memiliki.<br>• <b>Pengabdian</b> — lebih berkaitan dengan dedikasi dalam bertugas/melayani, biasanya dalam konteks pekerjaan atau tugas negara."},
{id:73,q:"Berdasarkan pasal 30 UUD 1945 usaha pembelaan negara menjadi tanggung jawab seluruh warga negara, hal tersebut berarti....",opts:["Warga negara ikut serta dalam membela negara","Hanya ABRI dan pemerintah saja yang bertanggungjawab","Yang membela negara adalah ABRI dan organisasi pertahanan wilayah","Membela negara adalah hak dan kewajiban setiap warga negara Indonesia"],ans:3, exp:"Pasal 30 UUD 1945: \"Tiap-tiap warga negara berhak dan wajib ikut serta dalam usaha pertahanan dan keamanan negara.\" Artinya: <b>membela negara adalah hak dan kewajiban setiap warga negara Indonesia</b>—berlaku bagi semua, tidak terkecuali.<br><br><b>Kenapa jawaban lain salah:</b><br>• <b>Warga negara ikut serta dalam membela negara</b> — benar tapi tidak lengkap; tidak menyebut bahwa ini adalah hak sekaligus kewajiban.<br>• <b>Hanya ABRI dan pemerintah saja yang bertanggung jawab</b> — bertentangan dengan Pasal 30 yang mewajibkan seluruh warga negara.<br>• <b>Yang membela negara adalah ABRI dan organisasi pertahanan</b> — terlalu sempit; Pasal 30 menyatakan \"tiap-tiap warga negara.\"  "},
